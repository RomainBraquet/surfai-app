<!-- v2 -->
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0e27">
    <link rel="manifest" href="manifest.json">
    <title>SurfAI</title>
    <style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0a0e27;
  color: #f0f4ff;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 14px;
  min-height: 100vh;
}

.app {
  max-width: 420px;
  margin: 0 auto;
  min-height: 100vh;
  position: relative;
}

/* ---- Navigation bas ---- */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 420px;
  height: 60px;
  display: flex;
  background: #0d2137;
  border-top: 1px solid rgba(255,255,255,0.08);
  z-index: 100;
}

.nav-tab {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  border: none;
  background: transparent;
  color: rgba(255,255,255,0.45);
  cursor: pointer;
  padding: 6px 0;
  transition: background 0.15s, color 0.15s;
}

.nav-tab.active {
  background: #4dff91;
  color: #0a0e27;
  font-weight: 700;
}

.nav-icon { font-size: 1.3rem; line-height: 1; }
.nav-label { font-size: 0.62rem; letter-spacing: 0.3px; }

/* ---- Panels ---- */
.tab-content { padding-bottom: 68px; }

.tab-panel { display: none; padding: 16px 14px 0; }
.tab-panel.active { display: block; }

/* ---- Cards ---- */
.card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 12px;
}

/* ---- Section labels ---- */
.section-label {
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: #888;
  margin-bottom: 8px;
  display: block;
}

/* ---- Hero profil ---- */
.hero {
  background: linear-gradient(135deg, #0a0e27, #0d2137);
  border-radius: 16px;
  padding: 18px 14px 14px;
  margin-bottom: 12px;
}

.hero-top {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 14px;
}

.avatar {
  width: 46px;
  height: 46px;
  border-radius: 50%;
  background: #4dff91;
  color: #0a0e27;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.4rem;
  font-weight: 700;
  flex-shrink: 0;
}

.hero-name { font-size: 1rem; font-weight: 700; color: #f0f4ff; }
.hero-sub  { font-size: 0.75rem; color: rgba(255,255,255,0.55); margin-top: 2px; }

/* ---- Grille météo 4 metrics ---- */
.meteo-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  text-align: center;
}

.meteo-val  { color: #4dff91; font-weight: 700; font-size: 0.95rem; }
.meteo-lbl  { font-size: 0.6rem; color: rgba(255,255,255,0.5); margin-top: 2px; }
.meteo-loc  { font-size: 0.72rem; color: rgba(255,255,255,0.4); margin-top: 10px; }

/* ---- Créneaux IA ---- */
.window-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.window-row:last-child { border-bottom: none; }

.score-badge {
  min-width: 36px;
  height: 36px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 1rem;
  flex-shrink: 0;
}

.score-green  { background: rgba(77,255,145,0.15); color: #4dff91; }
.score-blue   { background: rgba(0,207,255,0.15);  color: #00cfff; }
.score-orange { background: rgba(237,137,54,0.15); color: #ed8936; }

.window-info { flex: 1; min-width: 0; }
.window-title { font-size: 0.82rem; font-weight: 600; color: #f0f4ff; }
.window-meta  { font-size: 0.73rem; color: rgba(255,255,255,0.5); margin-top: 2px; }
.window-narrative { font-size: 0.72rem; font-style: italic; color: #888; margin-top: 3px; }

/* ---- Boutons rapides ---- */
.quick-btns {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 12px;
}

.btn-quick {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  color: #f0f4ff;
  padding: 12px;
  text-align: center;
  cursor: pointer;
  font-size: 0.82rem;
  font-weight: 600;
}

.btn-quick:active { background: rgba(77,255,145,0.15); }

/* ---- Spots (legacy, kept for compatibility) ---- */
.spot-name { font-size: 0.85rem; font-weight: 600; color: #f0f4ff; }
.spot-city { font-size: 0.73rem; color: rgba(255,255,255,0.45); margin-top: 2px; }
.spot-score { font-size: 0.78rem; font-weight: 700; }

/* Fiche spot (push navigation) */
.spot-detail { display: none; }
.spot-detail.active { display: block; }
.spot-list-view { }
.spot-list-view.hidden { display: none; }

.back-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  background: none;
  border: none;
  color: #4dff91;
  font-size: 0.82rem;
  cursor: pointer;
  padding: 0 0 12px;
  font-weight: 600;
}

.fav-btn {
  background: none;
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 20px;
  color: rgba(255,255,255,0.6);
  font-size: 0.78rem;
  padding: 4px 10px;
  cursor: pointer;
}
.fav-btn.active { border-color: #4dff91; color: #4dff91; }

/* ---- Session form ---- */
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 0.72rem; color: #888; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.4px; }

select, input[type="text"], input[type="date"], input[type="time"], input[type="number"], textarea {
  width: 100%;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 8px;
  color: #f0f4ff;
  padding: 9px 12px;
  font-size: 0.85rem;
  outline: none;
  -webkit-appearance: none;
}

select:focus, input:focus, textarea:focus {
  border-color: rgba(77,255,145,0.5);
}

select option { background: #0d2137; color: #f0f4ff; }

/* Sélecteur étoiles 1-5 */
.star-selector { display: flex; gap: 6px; margin-top: 4px; direction: rtl; }
.star-selector input[type="radio"] { display: none; }
.star-selector label {
  font-size: 1.6rem;
  cursor: pointer;
  color: rgba(255,255,255,0.2);
  transition: color 0.1s;
  direction: ltr;
}
.star-selector input:checked + label,
.star-selector input:checked + label ~ label { color: #4dff91; }

/* ---- Bouton principal ---- */
.btn-primary {
  width: 100%;
  background: #4dff91;
  color: #0a0e27;
  border: none;
  border-radius: 10px;
  padding: 13px;
  font-size: 0.9rem;
  font-weight: 700;
  cursor: pointer;
  margin-top: 4px;
}
.btn-primary:active { opacity: 0.85; }

/* ---- Profil ---- */
.profil-avatar {
  width: 64px; height: 64px; border-radius: 50%;
  background: #4dff91; color: #0a0e27;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.8rem; font-weight: 700; margin: 0 auto 12px;
}

.board-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.board-row:last-child { border-bottom: none; }
.board-name { font-size: 0.85rem; font-weight: 600; }
.board-meta { font-size: 0.72rem; color: rgba(255,255,255,0.45); }

.session-compact {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 7px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  font-size: 0.8rem;
}
.session-compact:last-child { border-bottom: none; }

/* Config collapsible */
.config-toggle {
  background: none;
  border: none;
  color: rgba(255,255,255,0.35);
  font-size: 0.75rem;
  cursor: pointer;
  padding: 8px 0;
  width: 100%;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 6px;
}
.config-body { display: none; padding-top: 12px; }
.config-body.open { display: block; }

/* ---- Feedback messages ---- */
.msg-success {
  background: rgba(77,255,145,0.12);
  border: 1px solid rgba(77,255,145,0.3);
  border-radius: 8px;
  color: #4dff91;
  padding: 10px 14px;
  font-size: 0.82rem;
  margin-bottom: 10px;
}
.msg-error {
  background: rgba(237,100,100,0.12);
  border: 1px solid rgba(237,100,100,0.3);
  border-radius: 8px;
  color: #fc8181;
  padding: 10px 14px;
  font-size: 0.82rem;
  margin-bottom: 10px;
}

/* ---- Loading / empty states ---- */
.loading { color: rgba(255,255,255,0.4); font-size: 0.82rem; padding: 16px 0; text-align: center; }
.empty   { color: rgba(255,255,255,0.35); font-size: 0.8rem; text-align: center; padding: 20px 0; }

/* ---- Filtres spots ---- */
.filter-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.filter-row select { font-size: 0.75rem; padding: 7px 8px; }

/* ---- Date/heure côte à côte ---- */
.datetime-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.switcher-btn {
  flex: 1;
  padding: 8px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.05);
  color: rgba(255,255,255,0.5);
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
}
.switcher-btn.active {
  background: rgba(77,255,145,0.15);
  border-color: rgba(77,255,145,0.4);
  color: #4dff91;
}
/* ===== AUTH OVERLAY ===== */
#auth-overlay {
  position: fixed; inset: 0; z-index: 1000;
  background: rgba(10,14,39,0.92);
  backdrop-filter: blur(6px);
  display: flex; align-items: center; justify-content: center;
}
#auth-overlay.hidden { display: none; }
.auth-card {
  background: #0d2137;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 32px 24px;
  width: 320px;
  text-align: center;
}
.auth-card .auth-logo { font-size: 40px; margin-bottom: 8px; }
.auth-card h2 { color: #f0f4ff; font-size: 1.2rem; margin: 0 0 4px; }
.auth-card .auth-sub { color: rgba(255,255,255,0.45); font-size: 0.8rem; margin-bottom: 24px; }
.auth-card input[type="email"] {
  width: 100%; box-sizing: border-box; padding: 12px; border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.06);
  color: #f0f4ff; font-size: 0.95rem; margin-bottom: 12px; outline: none;
}
.auth-card input[type="email"]::placeholder { color: rgba(255,255,255,0.3); }
.auth-card .auth-btn {
  width: 100%; padding: 12px; background: #4dff91; color: #0a0e27;
  border: none; border-radius: 8px; font-weight: 700; font-size: 0.95rem; cursor: pointer;
}
.auth-card .auth-btn:disabled { opacity: 0.5; cursor: default; }
.auth-card .auth-msg { margin-top: 12px; font-size: 0.82rem; min-height: 20px; }
.auth-card .auth-msg.success { color: #4dff91; }
.auth-card .auth-msg.error { color: #fc8181; }

/* ===== SPOTS REDESIGN ===== */
.fav-strip { padding: 0 4px; margin-bottom: 12px; }
.fav-strip-label { color: rgba(255,255,255,0.4); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.fav-strip-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; -webkit-overflow-scrolling: touch; }
.fav-strip-scroll::-webkit-scrollbar { display: none; }
.fav-card { min-width: 100px; border-radius: 10px; padding: 8px; text-align: center; cursor: pointer; flex-shrink: 0; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); transition: border-color 0.2s; }
.fav-score { border-radius: 50%; width: 24px; height: 24px; display: inline-flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.7rem; margin-bottom: 4px; color: #0a0e27; }
.fav-name { color: #f0f4ff; font-size: 0.75rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100px; }
.fav-city { color: rgba(255,255,255,0.35); font-size: 0.6rem; }

.spots-search { width: 100%; box-sizing: border-box; padding: 10px 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.06); color: #f0f4ff; font-size: 0.9rem; outline: none; margin-bottom: 8px; }
.spots-search::placeholder { color: rgba(255,255,255,0.3); }
.sort-chips { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
.sort-chip { border-radius: 20px; padding: 8px 18px; font-size: 0.85rem; cursor: pointer; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.4); }
.sort-chip.active { background: rgba(77,255,145,0.15); border-color: #4dff91; color: #4dff91; }
.filter-panel { display: none; margin-bottom: 8px; }
.filter-panel.open { display: flex; gap: 6px; }
.filter-panel select { flex: 1; padding: 6px 8px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.06); color: #f0f4ff; font-size: 0.75rem; }
.active-filters { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 6px; }
.active-filter { background: rgba(77,255,145,0.1); border: 1px solid rgba(77,255,145,0.3); border-radius: 12px; padding: 2px 8px; font-size: 0.65rem; color: #4dff91; cursor: pointer; }

.zone-chips { display: flex; gap: 6px; flex-wrap: nowrap; }
#surf-zone-chips, #city-chips { background: #0a0e27; }
#surf-zone-chips::-webkit-scrollbar, #city-chips::-webkit-scrollbar { display: none; }
#surf-zone-chips, #city-chips { scrollbar-width: none; }
.zone-chip { border-radius: 16px; padding: 4px 10px; font-size: 0.65rem; white-space: nowrap; flex-shrink: 0; cursor: pointer; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.5); transition: all 0.15s; }
.zone-chip.active { background: rgba(0,207,255,0.12); border-color: rgba(0,207,255,0.4); color: #00cfff; font-weight: 600; }

.spot-row { background: rgba(255,255,255,0.04); border-radius: 8px; padding: 10px; margin-bottom: 4px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
.spot-row:active { background: rgba(255,255,255,0.08); }
.spot-row-info { flex: 1; min-width: 0; }
.spot-row-name { color: #f0f4ff; font-size: 0.85rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.spot-row-meta { color: rgba(255,255,255,0.4); font-size: 0.7rem; margin-top: 2px; }

.spots-load-more { width: 100%; padding: 10px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: rgba(255,255,255,0.5); cursor: pointer; font-size: 0.8rem; margin-top: 8px; }
.spots-load-more:disabled { opacity: 0.4; cursor: default; }

.gmaps-btn { display: block; width: 100%; padding: 10px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; color: #f0f4ff; text-align: center; text-decoration: none; font-size: 0.85rem; margin: 12px 0; }
.spot-chars { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.spot-char { background: rgba(255,255,255,0.04); border-radius: 10px; padding: 10px; text-align: center; }
.spot-char-label { color: rgba(255,255,255,0.35); font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.spot-char-value { color: #f0f4ff; font-size: 0.85rem; font-weight: 600; }
.spot-char-sub { color: rgba(255,255,255,0.3); font-size: 0.65rem; margin-top: 2px; }
.spot-wind-box { background: rgba(0,207,255,0.06); border: 1px solid rgba(0,207,255,0.2); border-radius: 10px; padding: 10px; display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }

/* ===== SESSION SHARE CARD OVERLAY ===== */
#share-overlay {
  position: fixed; inset: 0; z-index: 1000;
  background: rgba(10,14,39,0.95);
  backdrop-filter: blur(6px);
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
#share-overlay.hidden { display: none; }
.share-card {
  background: #0d2137;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 28px 24px;
  width: 340px;
  max-height: 90vh;
  overflow-y: auto;
  text-align: center;
}
.share-card h2 { color: #f0f4ff; font-size: 1.3rem; margin: 0 0 6px; }
.share-card .share-check { font-size: 40px; margin-bottom: 8px; }
.share-card .share-spot { color: #f0f4ff; font-size: 1rem; font-weight: 600; margin-bottom: 4px; }
.share-card .share-meta { color: rgba(255,255,255,0.5); font-size: 0.85rem; margin-bottom: 20px; }
.share-card .share-stars { color: #ffd700; }
.share-btn-primary {
  display: block; width: 100%; padding: 14px; border: none; border-radius: 12px;
  background: #4dff91; color: #0a0e27; font-size: 1rem; font-weight: 700;
  cursor: pointer; margin-bottom: 12px;
}
.share-btn-primary:active { opacity: 0.85; }
.share-btn-skip {
  background: none; border: none; color: rgba(255,255,255,0.45);
  font-size: 0.9rem; cursor: pointer; padding: 8px;
}
.share-btn-skip:hover { color: rgba(255,255,255,0.7); }
.share-preview-img {
  width: 100%; max-width: 300px; border-radius: 10px;
  margin: 0 auto 16px; display: block;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}
.share-btn-row {
  display: flex; gap: 10px; justify-content: center; margin-bottom: 12px;
}
.share-btn-row button {
  flex: 1; padding: 12px; border: none; border-radius: 10px;
  font-size: 0.9rem; font-weight: 600; cursor: pointer;
}
.share-btn-save {
  background: rgba(255,255,255,0.1); color: #f0f4ff;
}
.share-btn-share {
  background: #4dff91; color: #0a0e27;
}
.share-file-input { display: none; }
    </style>
</head>
<body>
<div class="app">
  <div class="tab-content">

    <!-- ===== ACCUEIL ===== -->
    <div id="tab-accueil" class="tab-panel active">
      <div id="accueil-content">
        <div class="loading">🌊 Chargement...</div>
      </div>
    </div>

    <!-- ===== SPOTS ===== -->
    <div id="tab-spots" class="tab-panel">
      <!-- Bandeau mode sélection -->
      <div id="spot-pick-banner" style="display:none;padding:10px 14px;background:rgba(0,207,255,0.12);border-bottom:1px solid rgba(0,207,255,0.3);display:none;align-items:center;justify-content:space-between">
        <div style="color:#00cfff;font-size:0.85rem;font-weight:600">Sélectionne un spot pour ta session</div>
        <div onclick="cancelSpotPick()" style="color:rgba(255,255,255,0.5);cursor:pointer;font-size:0.8rem;padding:4px 10px;border:1px solid rgba(255,255,255,0.15);border-radius:6px">Annuler</div>
      </div>
      <div class="spot-list-view" id="spots-list-view">
        <!-- Favoris toujours visibles -->
        <div id="spots-favs-section"></div>

        <!-- Tabs Autour de moi / Explorer -->
        <div style="display:flex;gap:0;margin-bottom:12px">
          <div id="spots-tab-nearby" class="spots-tab active" onclick="switchSpotsTab('nearby')"
               style="flex:1;padding:10px;text-align:center;font-size:0.85rem;font-weight:600;cursor:pointer;border-bottom:2px solid #4dff91;color:#4dff91">Autour de moi</div>
          <div id="spots-tab-explore" class="spots-tab" onclick="switchSpotsTab('explore')"
               style="flex:1;padding:10px;text-align:center;font-size:0.85rem;cursor:pointer;border-bottom:2px solid transparent;color:rgba(255,255,255,0.4)">Explorer</div>
        </div>

        <!-- Contenu Autour de moi -->
        <div id="spots-nearby-content">
          <div id="spots-nearby-list"></div>
        </div>

        <!-- Contenu Explorer -->
        <div id="spots-explore-content" style="display:none">
          <input type="text" class="spots-search" id="spots-search" placeholder="🔍 Rechercher un spot...">
          <div id="spots-explore-countries"></div>
          <div id="surf-zone-chips" style="display:none;overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:8px;padding-bottom:4px"></div>
          <div id="city-chips" style="display:none;overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:10px;padding-bottom:4px"></div>
          <div id="spots-list"></div>
          <button id="spots-load-more" class="spots-load-more" onclick="loadMoreSpots()" style="display:none">Voir plus</button>
        </div>
      </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ========================================
        // GESTIONNAIRE CENTRALISÉ DE DONNÉES SURFAI
        // ========================================

        class SurfAIDataManager {
            constructor(backendUrl, supabaseClient = null) {
                this.backendUrl = backendUrl;
                this.supabase = supabaseClient;
                this.cache = {
                    weatherData: new Map(),
                    aiPreferences: null,
                    userProfile: null,
                    spots: null,
                    boards: null,
                    lastUpdate: new Map()
                };
                this.subscribers = new Map();
                this.weatherCacheTimeout = 30 * 60 * 1000; // 30 min
                this.staticCacheTimeout = 24 * 60 * 60 * 1000; // 24h
                this.currentUserId = null;
            }

            // GESTION SPOTS
            async getSpots() {
                if (this.cache.spots && this.isCacheValid('spots', this.staticCacheTimeout)) {
                    return this.cache.spots;
                }

                if (this.supabase) {
                    try {
                        const { data: spots, error } = await this.supabase
                            .from('spots')
                            .select('*')
                            .order('country, region, city, name');

                        if (error) throw error;
                        const hierarchy = this.buildSpotHierarchy(spots);
                        this.cache.spots = hierarchy;
                        this.cache.lastUpdate.set('spots', Date.now());
                        return hierarchy;
                    } catch (error) {
                        console.warn('Erreur Supabase spots, fallback:', error);
                    }
                }

                // Fallback spots par défaut
                const defaultSpots = this.getFallbackSpots();
                this.cache.spots = defaultSpots;
                return defaultSpots;
            }

            buildSpotHierarchy(spots) {
                const hierarchy = {};
                spots.forEach(spot => {
                    if (!hierarchy[spot.country]) hierarchy[spot.country] = {};
                    if (!hierarchy[spot.country][spot.region]) hierarchy[spot.country][spot.region] = {};
                    if (!hierarchy[spot.country][spot.region][spot.city]) hierarchy[spot.country][spot.region][spot.city] = [];
                    
                    hierarchy[spot.country][spot.region][spot.city].push({
                        id: spot.id,
                        name: spot.name,
                        coords: spot.coordinates,
                        type: spot.type,
                        difficulty: spot.difficulty
                    });
                });
                return hierarchy;
            }

            async getSpotsByLevel(country = null, region = null, city = null) {
                const hierarchy = await this.getSpots();
                if (!country) return Object.keys(hierarchy);
                if (!region) return Object.keys(hierarchy[country] || {});
                if (!city) return Object.keys(hierarchy[country]?.[region] || {});
                return hierarchy[country]?.[region]?.[city] || [];
            }

            async findSpotById(spotId) {
                const hierarchy = await this.getSpots();
                for (const country of Object.values(hierarchy)) {
                    for (const region of Object.values(country)) {
                        for (const city of Object.values(region)) {
                            const spot = city.find(s => s.id === spotId);
                            if (spot) return spot;
                        }
                    }
                }
                return null;
            }

            // GESTION MÉTÉO
            async getWeatherData(spotId, forceRefresh = false) {
                const cacheKey = `weather_${spotId}`;
                
                if (!forceRefresh && this.cache.weatherData.has(spotId)) {
                    const cached = this.cache.weatherData.get(spotId);
                    if (this.isCacheValid(cacheKey, this.weatherCacheTimeout)) {
                        return cached;
                    }
                }

                try {
                    const spot = await this.findSpotById(spotId);
                    const spotName = spot ? spot.name : spotId;
                    
                    const weatherData = await this.fetchFromBackend(`/api/v1/sessions/weather/auto?spot=${spotName}`);
                    
                    if (weatherData.success) {
                        const processedData = this.processWeatherData(weatherData.weather, spot);
                        this.cache.weatherData.set(spotId, processedData);
                        this.cache.lastUpdate.set(cacheKey, Date.now());
                        
                        if (this.supabase) {
                            await this.cacheWeatherInSupabase(spotId, processedData);
                        }
                        
                        return processedData;
                    }
                } catch (error) {
                    console.warn('Backend météo indisponible:', error);
                }

                return this.getDefaultWeatherData();
            }

            async cacheWeatherInSupabase(spotId, weatherData) {
                if (!this.supabase) return;
                try {
                    await this.supabase
                        .from('weather_cache')
                        .upsert({
                            spot_id: spotId,
                            timestamp: new Date(),
                            wave_height: weatherData.waveHeight,
                            wave_period: weatherData.wavePeriod,
                            wind_speed: weatherData.windSpeed,
                            wind_direction: weatherData.windDirection,
                            tide: weatherData.tide,
                            water_temp: weatherData.waterTemp,
                            confidence: weatherData.confidence
                        });
                } catch (error) {
                    console.warn('Erreur cache météo Supabase:', error);
                }
            }

            // GESTION PROFIL & BOARDS
            async getUserProfile(userId) {
                if (this.cache.userProfile && this.isCacheValid('profile', this.staticCacheTimeout)) {
                    return this.cache.userProfile;
                }

                if (this.supabase) {
                    try {
                        const { data: profile, error } = await this.supabase
                            .from('profiles')
                            .select('*')
                            .eq('id', userId)
                            .single();

                        if (error && error.code !== 'PGRST116') throw error;
                        this.cache.userProfile = profile || this.getDefaultProfile();
                        this.cache.lastUpdate.set('profile', Date.now());
                        return this.cache.userProfile;
                    } catch (error) {
                        console.warn('Erreur profil Supabase:', error);
                    }
                }

                return this.getDefaultProfile();
            }

            async getUserBoards(userId) {
                if (this.cache.boards && this.isCacheValid('boards', this.staticCacheTimeout)) {
                    return this.cache.boards;
                }

                if (this.supabase) {
                    try {
                        const { data: boards, error } = await this.supabase
                            .from('boards')
                            .select('*')
                            .eq('user_id', userId)
                            .order('created_at', { ascending: false });

                        if (error) throw error;
                        // Mapper board_type → type pour compatibilité JS
                        this.cache.boards = (boards || []).map(b => ({ ...b, type: b.board_type || b.type }));
                        this.cache.lastUpdate.set('boards', Date.now());
                        return this.cache.boards;
                    } catch (error) {
                        console.warn('Erreur boards Supabase:', error);
                    }
                }

                // Fallback localStorage
                const localBoards = JSON.parse(localStorage.getItem('surfai_boards') || '[]');
                this.cache.boards = localBoards;
                return localBoards;
            }

            async saveUserBoard(userId, board) {
                const row = {
                    user_id: userId,
                    name: board.name || board.nickname,
                    nickname: board.nickname || board.name,
                    size: board.length_ft || board.size,
                    board_type: board.type || board.board_type,
                    shaper: board.shaper || null,
                    brand: board.brand || null,
                    length_ft: board.length_ft || board.size,
                    width_in: board.width_in || null,
                    thickness_in: board.thickness_in || null,
                    volume_l: board.volume_l ? parseFloat(board.volume_l) : null,
                    tail_shape: board.tail_shape || null,
                    fins_setup: board.fins_setup || null,
                    year_made: board.year_made ? parseInt(board.year_made) : null,
                    condition: board.condition || 'bon',
                    photo_url: board.photo_url || null,
                    sweet_spot_wave_min: board.sweet_spot_wave_min ? parseFloat(board.sweet_spot_wave_min) : null,
                    sweet_spot_wave_max: board.sweet_spot_wave_max ? parseFloat(board.sweet_spot_wave_max) : null,
                    sweet_spot_wind: board.sweet_spot_wind || 'any',
                    sweet_spot_tide: board.sweet_spot_tide || 'any'
                };

                if (this.supabase) {
                    try {
                        const { data, error } = await this.supabase
                            .from('boards')
                            .insert([row])
                            .select();
                        if (error) throw error;
                        this.cache.boards = null;
                        return data;
                    } catch (error) {
                        console.warn('Erreur sauvegarde board Supabase:', error);
                    }
                }

                // Fallback localStorage
                const boards = JSON.parse(localStorage.getItem('surfai_boards') || '[]');
                const newBoard = { ...row, id: Date.now() };
                boards.push(newBoard);
                localStorage.setItem('surfai_boards', JSON.stringify(boards));
                this.cache.boards = null;
                return [newBoard];
            }

            // PRÉDICTIONS PERSONNALISÉES
            async getPersonalizedPrediction(userId, spotId, boardId = null) {
                try {
                    const [weatherData, aiPreferences, profile, boards] = await Promise.all([
                        this.getWeatherData(spotId),
                        this.getAIPreferences(userId),
                        this.getUserProfile(userId),
                        this.getUserBoards(userId)
                    ]);

                    const selectedBoard = boardId ? boards.find(b => b.id == boardId) : null;
                    const score = this.calculatePersonalizedScore(weatherData, aiPreferences, profile, selectedBoard);

                    return {
                        spotId,
                        boardId,
                        weather: weatherData,
                        score: score,
                        recommendation: this.generateRecommendation(score, weatherData, profile),
                        timestamp: new Date().toISOString()
                    };
                } catch (error) {
                    console.error('Erreur prédiction personnalisée:', error);
                    throw error;
                }
            }

            calculatePersonalizedScore(weather, aiPrefs, profile, board) {
                let score = 5.0;
                
                // Facteur conditions météo (40%)
                if (aiPrefs && aiPrefs.wavePreferences) {
                    const waveOptimal = aiPrefs.wavePreferences.optimalHeight.value;
                    const waveDiff = Math.abs(weather.waveHeight - waveOptimal);
                    score -= waveDiff * 1.5;
                }
                
                if (aiPrefs && aiPrefs.windPreferences) {
                    const windOptimal = aiPrefs.windPreferences.optimalSpeed.value;
                    const windDiff = Math.abs(weather.windSpeed - windOptimal);
                    score -= windDiff * 0.08;
                }

                // Facteur niveau utilisateur (30%)
                const levelFactor = this.getLevelFactor(profile.level, weather);
                score *= levelFactor;

                // Facteur board adaptée (20%)
                if (board) {
                    const boardFactor = this.getBoardFactor(board, weather, profile);
                    score *= boardFactor;
                }

                // Facteur confiance données (10%)
                score *= (weather.confidence || 0.7);

                return Math.max(1, Math.min(10, score));
            }

            getBoardFactor(board, weather, profile) {
                let factor = 1.0;
                
                const boardAdaptation = {
                    'longboard': { minWave: 0.3, maxWave: 1.5, skillBonus: 0.1 },
                    'shortboard': { minWave: 1.0, maxWave: 4.0, skillPenalty: 0.2 },
                    'fish': { minWave: 0.5, maxWave: 2.0, speedBonus: 0.15 },
                    'midlength': { minWave: 0.6, maxWave: 2.5, versatile: 0.1 }
                };

                const adaptation = boardAdaptation[board.type];
                if (adaptation) {
                    if (weather.waveHeight >= adaptation.minWave && weather.waveHeight <= adaptation.maxWave) {
                        factor += 0.1;
                    }
                    
                    if (adaptation.skillBonus && profile.level === 'beginner') {
                        factor += adaptation.skillBonus;
                    }
                    
                    if (adaptation.skillPenalty && profile.level === 'beginner') {
                        factor -= adaptation.skillPenalty;
                    }
                }
                
                return Math.max(0.7, Math.min(1.3, factor));
            }

            // UTILITAIRES
            async fetchFromBackend(endpoint, options = {}) {
                const url = `${this.backendUrl}${endpoint}`;
                const response = await fetch(url, {
                    headers: { 'Content-Type': 'application/json' },
                    ...options
                });
                return await response.json();
            }

            async getAIPreferences(userId) {
                if (this.cache.aiPreferences && this.isCacheValid('ai_prefs', this.weatherCacheTimeout)) {
                    return this.cache.aiPreferences;
                }

                try {
                    const data = await this.fetchFromBackend(`/api/v1/ai/demo/${userId}`);
                    this.cache.aiPreferences = data.userPreferences;
                    this.cache.lastUpdate.set('ai_prefs', Date.now());
                    return this.cache.aiPreferences;
                } catch (error) {
                    console.warn('Erreur préférences IA:', error);
                    return null;
                }
            }

            isCacheValid(key, timeout) {
                const lastUpdate = this.cache.lastUpdate.get(key);
                return lastUpdate && (Date.now() - lastUpdate) < timeout;
            }

            processWeatherData(raw, spot) {
                return {
                    waveHeight: raw.waveHeight || 0,
                    wavePeriod: raw.wavePeriod || 10,
                    windSpeed: raw.windSpeed || 10,
                    windDirection: raw.windDirection || 'N',
                    tide: raw.tide || 'mid',
                    waterTemp: raw.waterTemp || 15,
                    confidence: raw.confidence || 0.7,
                    timestamp: new Date().toISOString(),
                    source: 'backend',
                    spot: spot
                };
            }

            getFallbackSpots() {
                return {
                    'France': {
                        'Nouvelle-Aquitaine': {
                            'Biarritz': [
                                { id: 'biarritz-grande-plage', name: 'Grande Plage', coords: { lat: 43.4832, lng: -1.5586 }, type: 'beach_break', difficulty: 'beginner' },
                                { id: 'biarritz-miramar', name: 'Miramar', coords: { lat: 43.4825, lng: -1.5595 }, type: 'beach_break', difficulty: 'intermediate' },
                                { id: 'biarritz-cote-basques', name: 'Côte des Basques', coords: { lat: 43.4821, lng: -1.5601 }, type: 'reef_break', difficulty: 'intermediate' }
                            ],
                            'Anglet': [
                                { id: 'anglet-chambre-amour', name: 'Chambre d\'Amour', coords: { lat: 43.5156, lng: -1.5267 }, type: 'beach_break', difficulty: 'intermediate' },
                                { id: 'anglet-les-cavaliers', name: 'Les Cavaliers', coords: { lat: 43.5134, lng: -1.5278 }, type: 'beach_break', difficulty: 'beginner' }
                            ],
                            'Hossegor': [
                                { id: 'hossegor-la-nord', name: 'La Nord', coords: { lat: 43.6619, lng: -1.4022 }, type: 'beach_break', difficulty: 'expert' },
                                { id: 'hossegor-la-centrale', name: 'La Centrale', coords: { lat: 43.6615, lng: -1.4018 }, type: 'beach_break', difficulty: 'advanced' }
                            ]
                        }
                    }
                };
            }

            getDefaultWeatherData() {
                return {
                    waveHeight: 1.0,
                    wavePeriod: 10,
                    windSpeed: 15,
                    windDirection: 'W',
                    tide: 'mid',
                    waterTemp: 15,
                    confidence: 0.5,
                    source: 'default'
                };
            }

            getDefaultProfile() {
                return {
                    level: 'intermediate',
                    preferences: { waveMin: 0.8, waveMax: 2.5 }
                };
            }

            getLevelFactor(level, weather) {
                const factors = {
                    'beginner': weather.waveHeight > 1.5 ? 0.7 : 1.1,
                    'intermediate': 1.0,
                    'advanced': weather.waveHeight < 1.0 ? 0.9 : 1.1,
                    'expert': weather.waveHeight < 1.5 ? 0.8 : 1.2
                };
                return factors[level] || 1.0;
            }

            generateRecommendation(score, weather, profile) {
                if (score >= 8) return "Session PARFAITE pour vous ! Conditions idéales selon votre profil.";
                if (score >= 7) return "Excellente session en perspective ! Très proche de vos préférences.";
                if (score >= 6) return "Bonne session possible. Conditions favorables.";
                if (score >= 5) return "Session correcte mais pas optimale pour votre niveau.";
                return "Conditions peu favorables selon votre profil.";
            }
        }

        // ========================================
        // VARIABLES GLOBALES ET INITIALISATION
        // ========================================
        let backendUrl = window.location.hostname === 'localhost'
            ? 'http://localhost:3001'
            : 'https://surfai-backend.vercel.app';
        let backendApiKey = null;
        const DEFAULT_SUPABASE_URL = 'https://zssiqpxlqshsmhpqjzgb.supabase.co';
        const DEFAULT_SUPABASE_KEY = 'sb_publishable_3C5uSVKx16FeKH7qlSGsRw_DYHWQlBC';
        let supabaseClient = null;
        let dataManager = null;
        let userData = {
            sessions: [],
            spots: [],
            favoriteSpots: [],
            predictions: [],
            profile: {},
            boards: []
        };

        document.addEventListener('DOMContentLoaded', async function() {
            // Date par défaut pour le formulaire session
            const dateEl = document.getElementById('session-date');
            if (dateEl) dateEl.value = new Date().toISOString().split('T')[0];

            // Charger backend URL depuis localStorage
            const savedBackendUrl = localStorage.getItem('backend_url');
            const savedApiKey = localStorage.getItem('backend_api_key');
            if (savedBackendUrl && savedBackendUrl.includes('localhost')) {
                backendUrl = savedBackendUrl;
            } else if (savedBackendUrl) {
                localStorage.setItem('backend_url', backendUrl);
            }
            if (savedApiKey) backendApiKey = savedApiKey;

            // Créer le client Supabase
            supabaseClient = supabase.createClient(DEFAULT_SUPABASE_URL, DEFAULT_SUPABASE_KEY);
            dataManager = new SurfAIDataManager(backendUrl, supabaseClient);

            // Lancer l'auth — rien ne charge avant onAuthStateChange
            await initAuth();
        });

        // ========================================
        // AUTH
        // ========================================

        async function initAuth() {
            // Flag pour éviter double-init (onAuthStateChange + getSession)
            let authHandled = false;

            async function handleSignIn(session) {
                if (authHandled) return;
                authHandled = true;
                dataManager.currentUserId = session.user.id;
                dataManager.supabase = supabaseClient;
                if (window.location.search.includes('code=')) {
                    window.history.replaceState({}, '', window.location.pathname);
                }
                hideLoginOverlay();
                await checkOnboarding(session.user.id);
            }

            supabaseClient.auth.onAuthStateChange((event, session) => {
                // IMPORTANT : ne pas faire d'await dans ce callback (deadlock SDK v2)
                // Déférer le travail async hors du callback
                if ((event === 'SIGNED_IN' || event === 'INITIAL_SESSION') && session) {
                    setTimeout(() => handleSignIn(session), 0);
                } else if (event === 'SIGNED_OUT') {
                    authHandled = false;
                    dataManager.currentUserId = null;
                    userData = { sessions: [], spots: [], favoriteSpots: [], predictions: [], profile: {}, boards: [] };
                    showLoginOverlay();
                }
            });

            // Si ?code= dans l'URL, le SDK va l'échanger via onAuthStateChange
            // On attend un peu pour laisser le callback se déclencher
            if (window.location.search.includes('code=')) {
                // Le SDK échange le code automatiquement, onAuthStateChange gèrera le SIGNED_IN
                // Timeout de sécurité : si rien ne se passe en 5s, montrer le login
                setTimeout(() => {
                    if (!authHandled) {
                        showLoginOverlay();
                    }
                }, 5000);
                return;
            }

            // Pas de code dans l'URL : vérifier session existante
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                await handleSignIn(session);
            } else {
                showLoginOverlay();
            }
        }

        async function initApp() {
            await checkBackendConnection();
            await loadHarmonizedData();
            await loadFavIds();
            await loadSessions();
            await loadAccueil();
        }

        async function signOut() {
            await supabaseClient.auth.signOut();
        }

        // Bypass dev : connexion directe sans magic link
        async function devSignIn() {
            const DEV_USER_ID = '3ba8ad73-e2c6-49fe-ac88-c26b45551f4b';
            dataManager.currentUserId = DEV_USER_ID;
            dataManager.supabase = supabaseClient;
            hideLoginOverlay();
            await initApp();
        }

        // --- Overlay login ---

        function showLoginOverlay() {
            let overlay = document.getElementById('auth-overlay');
            if (!overlay) {
                overlay = document.createElement('div');
                overlay.id = 'auth-overlay';
                overlay.innerHTML = `
                    <div class="auth-card">
                        <div class="auth-logo">🏄‍♂️</div>
                        <h2>SurfAI</h2>
                        <p class="auth-sub">Ton assistant surf intelligent</p>
                        <input type="email" id="auth-email" placeholder="ton@email.com" />
                        <button class="auth-btn" id="auth-btn" onclick="sendMagicLink()">
                            Recevoir un lien de connexion
                        </button>
                        ${window.location.hostname === 'localhost' ? '<button class="auth-btn" style="margin-top:8px;background:rgba(255,255,255,0.1);color:#f0f4ff;font-size:0.8rem" onclick="devSignIn()">🔧 Connexion dev</button>' : ''}
                        <div class="auth-msg" id="auth-msg"></div>
                    </div>`;
                document.body.appendChild(overlay);
                overlay.querySelector('#auth-email').addEventListener('keydown', e => {
                    if (e.key === 'Enter') sendMagicLink();
                });
            }
            overlay.classList.remove('hidden');
        }

        function hideLoginOverlay() {
            const overlay = document.getElementById('auth-overlay');
            if (overlay) overlay.classList.add('hidden');
        }

        async function sendMagicLink() {
            const emailEl = document.getElementById('auth-email');
            const btn = document.getElementById('auth-btn');
            const msg = document.getElementById('auth-msg');
            const email = emailEl?.value?.trim();
            if (!email || !email.includes('@')) {
                msg.textContent = 'Adresse email invalide';
                msg.className = 'auth-msg error';
                return;
            }
            btn.disabled = true;
            btn.textContent = 'Envoi...';
            msg.textContent = '';
            const { error } = await supabaseClient.auth.signInWithOtp({
                email,
                options: { emailRedirectTo: window.location.origin }
            });
            if (error) {
                msg.textContent = '❌ ' + error.message;
                msg.className = 'auth-msg error';
                btn.disabled = false;
                btn.textContent = 'Recevoir un lien de connexion';
            } else {
                msg.textContent = '✉️ Vérifie ta boîte mail !';
                msg.className = 'auth-msg success';
                btn.textContent = 'Lien envoyé';
            }
        }

        // --- Onboarding ---

        async function checkOnboarding(userId) {
            // Timeout de 5s pour éviter un hang si RLS bloque la requête
            const profilePromise = supabaseClient
                .from('profiles')
                .select('id')
                .eq('id', userId)
                .maybeSingle();
            const timeoutPromise = new Promise((_, reject) =>
                setTimeout(() => reject(new Error('timeout')), 5000)
            );
            try {
                const { data } = await Promise.race([profilePromise, timeoutPromise]);
                if (!data) {
                    showOnboarding(userId);
                } else {
                    await initApp();
                }
            } catch {
                // Timeout ou erreur RLS → le profil existe probablement, lancer l'app
                await initApp();
            }
        }

        async function loadGeoWeather() {
          const updateMeteo = (weather, locLabel) => {
            document.getElementById('m-water').textContent = weather.waterTemp != null ? Math.round(weather.waterTemp) + '°' : '–';
            document.getElementById('m-wind').textContent  = weather.windSpeed  != null ? Math.round(weather.windSpeed)  + 'km/h' : '–';
            document.getElementById('m-wave').textContent  = weather.waveHeight != null ? weather.waveHeight.toFixed(1) + 'm' : '–';
            document.getElementById('m-tide').textContent  = weather.nextTide ? weather.nextTide.label : '–';
            const locEl = document.getElementById('meteo-loc');
            if (locEl) locEl.textContent = locLabel;
          };

          const fetchWeatherCoords = async (lat, lng) => {
            const res = await fetch(`${backendUrl}/api/v1/weather/current?lat=${lat}&lng=${lng}`);
            const data = await res.json();
            return data.success ? data.weather : null;
          };

          // Trouver le nom de la ville la plus proche via la base de spots
          const findNearestCity = async (lat, lng) => {
            try {
              const { data } = await supabaseClient
                .from('spots')
                .select('city, lat, lng')
                .not('lat', 'is', null)
                .limit(200);
              if (!data?.length) return 'Position actuelle';
              let best = null, bestDist = Infinity;
              for (const s of data) {
                const d = Math.sqrt(Math.pow(s.lat - lat, 2) + Math.pow(s.lng - lng, 2));
                if (d < bestDist) { bestDist = d; best = s; }
              }
              return best?.city || 'Position actuelle';
            } catch(e) { return 'Position actuelle'; }
          };

          const loadWeatherWithCity = async (lat, lng) => {
            const [weather, city] = await Promise.all([
              fetchWeatherCoords(lat, lng),
              findNearestCity(lat, lng)
            ]);
            if (weather) updateMeteo(weather, `📍 ${city} · maintenant`);
            else loadGeoWeatherFallback(fetchWeatherCoords, updateMeteo);
          };

          // Si géoloc déjà connue (via onglet Spots), l'utiliser directement
          if (_userLat != null) {
            try { await loadWeatherWithCity(_userLat, _userLng); }
            catch(e) { loadGeoWeatherFallback(fetchWeatherCoords, updateMeteo); }
          } else if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
              async (pos) => {
                try {
                  _userLat = pos.coords.latitude;
                  _userLng = pos.coords.longitude;
                  await loadWeatherWithCity(_userLat, _userLng);
                } catch (e) {
                  loadGeoWeatherFallback(fetchWeatherCoords, updateMeteo);
                }
              },
              () => loadGeoWeatherFallback(fetchWeatherCoords, updateMeteo)
            );
          } else {
            loadGeoWeatherFallback(fetchWeatherCoords, updateMeteo);
          }
        }

        async function loadGeoWeatherFallback(fetchWeatherCoords, updateMeteo) {
          try {
            const homeSpot = JSON.parse(localStorage.getItem('home_spot') || 'null');
            const lat  = homeSpot?.lat  ?? 43.48;
            const lng  = homeSpot?.lng  ?? -1.56;
            const name = homeSpot?.name ?? 'Biarritz';
            const weather = await fetchWeatherCoords(lat, lng);
            if (weather) updateMeteo(weather, `📍 ${name} · maintenant`);
          } catch (e) {
            const locEl = document.getElementById('meteo-loc');
            if (locEl) locEl.textContent = '📍 Météo indisponible';
          }
        }

        async function loadAccueilWindows(userId) {
          const container = document.getElementById('accueil-windows');
          if (!container) return;
          try {
            const res = await fetch(`${backendUrl}/api/v1/predictions/best-windows?userId=${userId}&days=3`);
            const data = await res.json();

            if (!data.success || !data.results?.length) {
              container.innerHTML = '<div class="empty">Pas de créneaux disponibles — enregistrez des sessions.</div>';
              return;
            }

            // Organiser par spot : le meilleur créneau de chaque spot favori
            // Trier par score MAIS pénaliser les spots lointains
            const userLat = _userLat || JSON.parse(localStorage.getItem('home_spot') || '{}').lat || 43.48;
            const userLng = _userLng || JSON.parse(localStorage.getItem('home_spot') || '{}').lng || -1.56;

            const spotCards = data.results
              .filter(r => r.windows?.length > 0)
              .map(r => {
                const spotLat = r.spot?.lat || 0;
                const spotLng = r.spot?.lng || 0;
                const distKm = spotLat ? haversineKm(spotLat, spotLng, userLat, userLng) : 0;
                // Score ajusté : pénalité de 0.1 point par 10km de distance
                const adjustedScore = r.windows[0].score - (distKm / 100);
                return { spot: r.spot, best: r.windows[0], distKm, adjustedScore };
              })
              .sort((a, b) => b.adjustedScore - a.adjustedScore);

            if (!spotCards.length) {
              container.innerHTML = '<div class="empty">Aucun créneau favorable sur 3 jours.</div>';
              return;
            }

            function dirToCardinal(d) {
              if (typeof d !== 'number') return d || '';
              return ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'][Math.round(d / 22.5) % 16];
            }

            const html = spotCards.map((item, i) => {
              const w = item.best;
              const spotName = item.spot?.name || '';

                return `<div style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:16px;margin-bottom:10px">
                  <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
                    <div style="background:${scoreColor};color:#0a0e27;border-radius:50%;width:44px;height:44px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1.2rem;flex-shrink:0">${w.score}</div>
                    <div>
                      <div style="color:#f0f4ff;font-size:1rem;font-weight:600">${spotName}</div>
                      <div style="color:rgba(255,255,255,0.5);font-size:0.85rem">${date} · ${w.timeWindow || ''}</div>
                    </div>
                  </div>
                  <div style="color:rgba(255,255,255,0.5);font-size:0.8rem">🌊 ${(w.conditions?.waveHeight || 0).toFixed(1)}m · 💨 ${Math.round(w.conditions?.windSpeed || 0)}km/h · 🧭 ${windDir}${w.conditions?.wavePeriod ? ' · ⏱ ' + Math.round(w.conditions.wavePeriod) + 's' : ''}${w.conditions?.tidePhase ? ' · 🌙 ' + ({low:'↓',high:'↑',rising:'↗',falling:'↘'}[w.conditions.tidePhase] || '') : ''}</div>
                  ${whyHtml}

              // Autres spots = cards compactes mais informatives
              return `<div style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:12px;margin-bottom:8px">
                <div style="display:flex;align-items:center;gap:10px">
                  <div style="background:${scoreColor};color:#0a0e27;border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.9rem;flex-shrink:0">${w.score}</div>
                  <div style="flex:1;min-width:0">
                    <div style="color:#f0f4ff;font-size:0.88rem;font-weight:600">${spotName}</div>
                    <div style="color:rgba(255,255,255,0.45);font-size:0.75rem">${date} · ${w.timeWindow || ''}</div>
                  </div>

                            <div style="color:rgba(255,255,255,0.4);font-size:0.7rem">${s.city || ''}${cond.waveHeight != null ? ` · 🌊 ${cond.waveHeight.toFixed(1)}m` : ''}${cond.windSpeed != null ? ` · 💨 ${Math.round(cond.windSpeed)}km/h ${cond.windDirection || ''}` : ''}${cond.wavePeriod != null ? ` · ${cond.wavePeriod.toFixed(0)}s` : ''}</div>

        function toggleSpotsFavs() {
            const list = document.getElementById('spots-favs-list');
            const arrow = document.getElementById('spots-favs-arrow');
            if (!list) return;
            const isOpen = list.style.display !== 'none';

        async function loadNearbySpots() {
            const container = document.getElementById('spots-nearby-list');
            if (!container) return;

            if (_userLat != null) {
                // Géoloc active — charger spots < 10km
                container.innerHTML = '<div class="loading">Recherche des spots proches...</div>';
                try {
                    const { data } = await supabaseClient
                        .from('spots')
                        .select('id, name, city, region, country, lat, lng, wave_type, surf_zone')
                        .not('lat', 'is', null)
                        .limit(200);
                    const nearby = (data || [])
                        .map(s => ({ ...s, _dist: haversineKm(s.lat, s.lng, _userLat, _userLng) }))
                        .filter(s => s._dist <= 10)
                        .sort((a, b) => a._dist - b._dist);

                    if (nearby.length === 0) {
                        // Aucun spot à 10km — montrer les 5 plus proches
                        const closest = (data || [])
                            .map(s => ({ ...s, _dist: haversineKm(s.lat, s.lng, _userLat, _userLng) }))
                            .sort((a, b) => a._dist - b._dist)
                            .slice(0, 5);
                        container.innerHTML = `
                            <div style="color:rgba(255,255,255,0.4);font-size:0.8rem;margin-bottom:10px">Aucun spot à moins de 10km. Voici les plus proches :</div>
                            ${renderSpotRows(closest)}`;
                    } else {
                        container.innerHTML = `
                            <div style="color:rgba(255,255,255,0.4);font-size:0.7rem;margin-bottom:8px">${nearby.length} spot${nearby.length > 1 ? 's' : ''} à moins de 10km</div>
                            ${renderSpotRows(nearby)}`;
                    }
                } catch(e) {
                    container.innerHTML = '<div class="empty">Erreur de chargement.</div>';
                }
            } else {
                // Géoloc pas active — proposer de l'activer
                container.innerHTML = `
                    <div style="text-align:center;padding:30px 10px">
                        <div style="font-size:2rem;margin-bottom:12px">📍</div>
                        <div style="color:#f0f4ff;font-size:0.9rem;font-weight:600;margin-bottom:8px">Active la géolocalisation</div>
                        <div style="color:rgba(255,255,255,0.4);font-size:0.8rem;margin-bottom:16px">Pour voir les spots de surf autour de toi</div>
                        <button onclick="requestGeolocAndReload()" style="padding:10px 24px;background:#4dff91;color:#0a0e27;border:none;border-radius:8px;font-weight:700;font-size:0.9rem;cursor:pointer">Activer la géolocalisation</button>
                    </div>`;
            }
        }

        function requestGeolocAndReload() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    pos => {
                        _userLat = pos.coords.latitude;
                        _userLng = pos.coords.longitude;
                        loadNearbySpots();
                    },
                    () => {
                        document.getElementById('spots-nearby-list').innerHTML = `
                            <div style="text-align:center;padding:20px;color:rgba(255,255,255,0.4);font-size:0.85rem">
                                Géolocalisation refusée. Utilise l'onglet Explorer pour trouver tes spots.
                            </div>`;
                    }
                );
            }
        }

        function renderSpotRows(spots) {
            return spots.map(s => {
                const isFav = _favSpotIds.has(s.id);
                const distTxt = s._dist != null ? `${s._dist.toFixed(1)}km` : '';
                const loc = [s.city, s.surf_zone || s.region].filter(Boolean).join(' · ');
                const meta = [distTxt, loc].filter(Boolean).join(' · ');
                return `<div class="spot-row">
                    <div class="spot-row-info" onclick="showSpotDetail('${s.id}')">
                        <div class="spot-row-name">${s.name}</div>
                        <div class="spot-row-meta">${meta}</div>
                    </div>
                    <div onclick="event.stopPropagation();toggleFavorite('${s.id}',this)"
                         class="${isFav ? 'active' : ''}"
                         style="font-size:1.2rem;cursor:pointer;padding:4px 8px;flex-shrink:0">${isFav ? '⭐' : '☆'}</div>
                </div>`;
            }).join('');
        }

        async function loadExploreView() {
            // Charger les pays
            const countriesDiv = document.getElementById('spots-explore-countries');
            if (!countriesDiv) return;

            try {
                const { data } = await supabaseClient.from('spots').select('country').not('country', 'is', null).order('country');
                const countries = [...new Set((data || []).map(s => s.country))];
                countriesDiv.innerHTML = `
                    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">
                        ${countries.map(c => `
                            <div onclick="onSpotsCountryChange_explore('${c}')"
                                 style="padding:8px 16px;border-radius:20px;font-size:0.85rem;cursor:pointer;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.5)">${c}</div>
                        `).join('')}
                    </div>`;
            } catch(e) {}

            // Search
            const searchEl = document.getElementById('spots-search');
            if (searchEl) {
                searchEl.value = '';
                searchEl.oninput = () => {
                    clearTimeout(_spotsSearchTimeout);
                    _spotsSearchTimeout = setTimeout(() => {
                        const q = searchEl.value.trim();
                        if (q.length < 2) { document.getElementById('spots-list').innerHTML = ''; return; }
                        _spotsFilters = { search: q };
                        _spotsPage = 0;
                        _spotsLoaded = [];
                        loadAndRenderSpots();
                    }, 300);
                };
            }

            // Reset la liste
            document.getElementById('spots-list').innerHTML = '';
            document.getElementById('spots-load-more').style.display = 'none';
        }

        async function onSpotsCountryChange_explore(country) {
            const FRANCE_ZONE_ORDER = ['Pays Basque', 'Landes', 'Gironde', 'Charentes', 'Vendée', 'Bretagne Sud', 'Bretagne Nord', 'Normandie / Manche', 'Nord', 'Méditerranée Ouest', 'Méditerranée Est', 'Corse', 'Réunion'];

            const countriesDiv = document.getElementById('spots-explore-countries');
            const zoneContainer = document.getElementById('surf-zone-chips');
            const cityContainer = document.getElementById('city-chips');

            // Charger les zones
            const { data } = await supabaseClient.from('spots').select('surf_zone').eq('country', country).not('surf_zone', 'is', null);
            const rawZones = [...new Set((data || []).map(s => s.surf_zone))];
            const zones = country === 'France'
                ? FRANCE_ZONE_ORDER.filter(z => rawZones.includes(z)).concat(rawZones.filter(z => !FRANCE_ZONE_ORDER.includes(z)).sort())
                : rawZones.sort();

            // Mettre le pays en surbrillance
            countriesDiv.querySelectorAll('div').forEach(d => {
                d.style.background = d.textContent.trim() === country ? 'rgba(77,255,145,0.15)' : 'rgba(255,255,255,0.06)';
                d.style.borderColor = d.textContent.trim() === country ? '#4dff91' : 'rgba(255,255,255,0.15)';
                d.style.color = d.textContent.trim() === country ? '#4dff91' : 'rgba(255,255,255,0.5)';
            });

            if (zones.length > 1) {
                zoneContainer.style.display = 'block';
                zoneContainer.innerHTML = `<div style="display:flex;gap:6px;flex-wrap:wrap">${zones.map(z =>
                    `<div class="zone-chip" onclick="onZoneClick_explore('${z.replace(/'/g,"\\'")}')">${z}</div>`
                ).join('')}</div>`;
            } else {
                zoneContainer.style.display = 'none';
            }
            cityContainer.style.display = 'none';
            cityContainer.innerHTML = '';

            // Charger les spots du pays
            _spotsFilters = { country };
            _spotsPage = 0;
            _spotsLoaded = [];
            loadAndRenderSpots();
        }

        async function onZoneClick_explore(zone) {
            // Highlight la zone
            document.querySelectorAll('#surf-zone-chips .zone-chip').forEach(c => {
                c.classList.toggle('active', c.textContent.trim() === zone);
            });

            const cityContainer = document.getElementById('city-chips');

            // Charger les villes si > 10 spots
            const { data: zoneSpots } = await supabaseClient.from('spots').select('city').eq('surf_zone', zone).not('city', 'is', null);
            const cities = [...new Set((zoneSpots || []).map(s => s.city))].sort();

            if (cities.length > 1 && zoneSpots.length > 10) {
                cityContainer.style.display = 'block';
                cityContainer.innerHTML = `<div style="display:flex;gap:6px;flex-wrap:wrap">${cities.map(c =>
                    `<div class="zone-chip" onclick="onCityClick_explore('${c.replace(/'/g,"\\'")}')">${c}</div>`
                ).join('')}</div>`;
            } else {
                cityContainer.style.display = 'none';
            }

            _spotsFilters = { ..._spotsFilters, surf_zone: zone };
            delete _spotsFilters.city;
            _spotsPage = 0;
            _spotsLoaded = [];
            loadAndRenderSpots();
        }

        function onCityClick_explore(city) {
            document.querySelectorAll('#city-chips .zone-chip').forEach(c => {
                c.classList.toggle('active', c.textContent.trim() === city);
            });
            _spotsFilters.city = city;
            _spotsPage = 0;
            _spotsLoaded = [];
            loadAndRenderSpots();
        }

        async function loadAndRenderSpots() {
            const list = document.getElementById('spots-list');
            const btn = document.getElementById('spots-load-more');
            if (!list) return;

            if (_spotsPage === 0) list.innerHTML = '<div class="empty">Chargement...</div>';

            let query = supabaseClient
                .from('spots')
                .select('id, name, city, region, country, lat, lng, wave_type, difficulty, surf_zone')
                .range(_spotsPage * SPOTS_PAGE_SIZE, (_spotsPage + 1) * SPOTS_PAGE_SIZE - 1)
                .order('name');

            if (_spotsFilters.country) query = query.eq('country', _spotsFilters.country);
            if (_spotsFilters.surf_zone) query = query.eq('surf_zone', _spotsFilters.surf_zone);
            if (_spotsFilters.city) query = query.eq('city', _spotsFilters.city);
            if (_spotsFilters.search && _spotsFilters.search.length >= 2) {
                const s = _spotsFilters.search.replace(/[.,()]/g, '');
                query = query.or(`name.ilike.%${s}%,city.ilike.%${s}%,region.ilike.%${s}%,country.ilike.%${s}%`);
            }

            const { data, error } = await query;
            const spots = data || [];

            if (_spotsPage === 0) {
                _spotsLoaded = spots;
                list.innerHTML = '';
            } else {
                _spotsLoaded.push(...spots);
            }

            // Render
            if (_spotsLoaded.length === 0) {
                list.innerHTML = '<div class="empty">Aucun spot trouvé.</div>';
            } else {
                list.innerHTML = renderSpotRows(_spotsLoaded);
            }

            // Voir plus
            if (btn) {
                btn.style.display = spots.length < SPOTS_PAGE_SIZE ? 'none' : 'block';
                btn.disabled = false;
                btn.textContent = 'Voir plus';
            }
        }

        function loadMoreSpots() {
            const btn = document.getElementById('spots-load-more');
            if (btn) { btn.disabled = true; btn.textContent = 'Chargement...'; }
            _spotsPage++;
            loadAndRenderSpots();
        }

            _spotsFilters.country = country || undefined;
            _spotsFilters.surf_zone = undefined;

            const zoneContainer = document.getElementById('surf-zone-chips');

                const { data } = await supabaseClient
                    .from('spots')
                    .select('surf_zone')

                    .not('surf_zone', 'is', null);

                const rawZones = [...new Set((data || []).map(s => s.surf_zone))];
                const zones = country === 'France'
                    ? FRANCE_ZONE_ORDER.filter(z => rawZones.includes(z)).concat(rawZones.filter(z => !FRANCE_ZONE_ORDER.includes(z)).sort())

        async function selectSurfZone(el, zone) {
            const isActive = el.classList.contains('active');
            document.querySelectorAll('.zone-chip').forEach(c => c.classList.remove('active'));
            _spotsFilters.city = undefined;

            if (isActive) {
                _spotsFilters.surf_zone = undefined;
                // Masquer les city chips
                const cityContainer = document.getElementById('city-chips');
                if (cityContainer) { cityContainer.style.display = 'none'; cityContainer.innerHTML = ''; }
            } else {
                el.classList.add('active');
                _spotsFilters.surf_zone = zone;

                // Drill-down : si >10 spots dans cette zone, afficher les villes
                const cityContainer = document.getElementById('city-chips');
                if (cityContainer) {
                    const { data } = await supabaseClient
                        .from('spots')
                        .select('city')
                        .eq('surf_zone', zone)
                        .not('city', 'is', null);
                    const cities = [...new Set((data || []).map(s => s.city))].sort();
                    if (cities.length > 1 && data.length > 10) {
                        cityContainer.style.display = 'block';
                        cityContainer.innerHTML = `<div class="zone-chips">${cities.map(c =>
                            `<div class="zone-chip" onclick="selectCity(this, '${c.replace(/'/g, "\\'")}')">${c}</div>`
                        ).join('')}</div>`;
                    } else {
                        cityContainer.style.display = 'none';
                        cityContainer.innerHTML = '';
                    }
                }
            }
            renderActiveFilters();
            _spotsPage = 0; _spotsLoaded = [];
            loadAndRenderSpots();
        }

        function selectCity(el, city) {
            const isActive = el.classList.contains('active');
            document.querySelectorAll('#city-chips .zone-chip').forEach(c => c.classList.remove('active'));
            if (isActive) {
                _spotsFilters.city = undefined;
            } else {
                el.classList.add('active');
                _spotsFilters.city = city;
            }
            renderActiveFilters();
            _spotsPage = 0; _spotsLoaded = [];
            loadAndRenderSpots();
        }

        function renderActiveFilters() {
            const el = document.getElementById('active-filters');
            if (!el) return;
            const chips = [];
            if (_spotsFilters.country) chips.push(`<span class="active-filter" onclick="clearFilter('country')">✕ ${_spotsFilters.country}</span>`);
            if (_spotsFilters.surf_zone) chips.push(`<span class="active-filter" onclick="clearFilter('surf_zone')">✕ ${_spotsFilters.surf_zone}</span>`);
            if (_spotsFilters.city) chips.push(`<span class="active-filter" onclick="clearFilter('city')">✕ ${_spotsFilters.city}</span>`);
            el.innerHTML = chips.join('');
        }

        function clearFilter(key) {
            delete _spotsFilters[key];

        function haversineKm(lat1, lng1, lat2, lng2) {
            const R = 6371;
            const toRad = d => d * Math.PI / 180;
            const dLat = toRad(lat2 - lat1);
            const dLng = toRad(lng2 - lng1);
            const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        async function prefetchSpotScores(userId) {
          if (!userId) return;
          try {
            const res = await fetch(`${backendUrl}/api/v1/predictions/best-windows?userId=${userId}&days=2`);
            const data = await res.json();
            if (!data.success || !data.results) return;
            _spotScoresCache = {};
            const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate() + 1);
            const tomorrowStr = tomorrow.toISOString().split('T')[0];
            data.results.forEach(spotResult => {
              if (spotResult.spot?.id && spotResult.windows?.length) {
                const tomorrowWindows = spotResult.windows.filter(w => w.date?.startsWith(tomorrowStr));
                const bestScore = tomorrowWindows.length
                  ? Math.max(...tomorrowWindows.map(w => w.score))
                  : spotResult.windows[0]?.score;
                if (bestScore) _spotScoresCache[spotResult.spot.id] = { score: bestScore };
              }
            });
          } catch (e) { /* silencieux */ }
        }

        async function spotPickerFilterCountry(country) {
            const FRANCE_ZONE_ORDER = ['Pays Basque', 'Landes', 'Gironde', 'Charentes', 'Vendée', 'Bretagne Sud', 'Bretagne Nord', 'Normandie / Manche', 'Nord', 'Méditerranée Ouest', 'Méditerranée Est', 'Corse', 'Réunion'];

            const rawZones = [...new Set((data || []).map(s => s.surf_zone))];
            const zones = country === 'France'
                ? FRANCE_ZONE_ORDER.filter(z => rawZones.includes(z)).concat(rawZones.filter(z => !FRANCE_ZONE_ORDER.includes(z)).sort())
                : rawZones.sort();

            if (zones.length > 1) {
                // Show zone chips
                const overlay = document.getElementById('spot-picker-overlay');
                const container = overlay.querySelector('[style*="overflow-y:auto"]') || overlay.lastElementChild;
                const zonesHtml = `
                    <div style="margin-bottom:10px">
                        <div style="color:rgba(255,255,255,0.4);font-size:0.7rem;text-transform:uppercase;margin-bottom:6px">${country} — Zones</div>
                        <div style="display:flex;gap:6px;flex-wrap:wrap">
                            ${zones.map(z => `
                                <div onclick="spotPickerFilterZone('${z.replace(/'/g,"\\'")}')"
                                     style="padding:6px 14px;border-radius:20px;font-size:0.8rem;cursor:pointer;border:1px solid rgba(0,207,255,0.3);background:rgba(0,207,255,0.08);color:#00cfff">${z}</div>
                            `).join('')}
                        </div>
                    </div>`;
                // Re-render with zones
                renderSpotPicker();
                const scrollArea = document.getElementById('spot-picker-overlay').querySelector('[style*="overflow-y:auto"]');
                if (scrollArea) {
                    scrollArea.innerHTML = zonesHtml;
                }
            } else {
                // Direct to spot list
                const { data: spots } = await supabaseClient.from('spots').select('id, name, city, surf_zone, country').eq('country', country).order('name').limit(50);
                renderSpotPicker(spots || [], country);
            }
        }

        async function spotPickerFilterZone(zone) {
            const { data: spots } = await supabaseClient.from('spots').select('id, name, city, surf_zone, country').eq('surf_zone', zone).order('name').limit(50);
            renderSpotPicker(spots || [], zone);
        }
