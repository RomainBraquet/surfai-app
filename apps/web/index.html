<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏄‍♂️ SurfAI - App Intelligente (Backend)</title>
    <style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0a0e27;
  color: #f0f4ff;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 14px;
  min-height: 100vh;
}

.app {
  max-width: 420px;
  margin: 0 auto;
  min-height: 100vh;
  position: relative;
}

/* ---- Navigation bas ---- */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 420px;
  height: 60px;
  display: flex;
  background: #0d2137;
  border-top: 1px solid rgba(255,255,255,0.08);
  z-index: 100;
}

.nav-tab {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  border: none;
  background: transparent;
  color: rgba(255,255,255,0.45);
  cursor: pointer;
  padding: 6px 0;
  transition: background 0.15s, color 0.15s;
}

.nav-tab.active {
  background: #4dff91;
  color: #0a0e27;
  font-weight: 700;
}

.nav-icon { font-size: 1.3rem; line-height: 1; }
.nav-label { font-size: 0.62rem; letter-spacing: 0.3px; }

/* ---- Panels ---- */
.tab-content { padding-bottom: 68px; }

.tab-panel { display: none; padding: 16px 14px 0; }
.tab-panel.active { display: block; }

/* ---- Cards ---- */
.card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 12px;
}

/* ---- Section labels ---- */
.section-label {
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: #888;
  margin-bottom: 8px;
  display: block;
}

/* ---- Hero profil ---- */
.hero {
  background: linear-gradient(135deg, #0a0e27, #0d2137);
  border-radius: 16px;
  padding: 18px 14px 14px;
  margin-bottom: 12px;
}

.hero-top {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 14px;
}

.avatar {
  width: 46px;
  height: 46px;
  border-radius: 50%;
  background: #4dff91;
  color: #0a0e27;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.4rem;
  font-weight: 700;
  flex-shrink: 0;
}

.hero-name { font-size: 1rem; font-weight: 700; color: #f0f4ff; }
.hero-sub  { font-size: 0.75rem; color: rgba(255,255,255,0.55); margin-top: 2px; }

/* ---- Grille météo 4 metrics ---- */
.meteo-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  text-align: center;
}

.meteo-val  { color: #4dff91; font-weight: 700; font-size: 0.95rem; }
.meteo-lbl  { font-size: 0.6rem; color: rgba(255,255,255,0.5); margin-top: 2px; }
.meteo-loc  { font-size: 0.72rem; color: rgba(255,255,255,0.4); margin-top: 10px; }

/* ---- Créneaux IA ---- */
.window-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.window-row:last-child { border-bottom: none; }

.score-badge {
  min-width: 36px;
  height: 36px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 1rem;
  flex-shrink: 0;
}

.score-green  { background: rgba(77,255,145,0.15); color: #4dff91; }
.score-blue   { background: rgba(0,207,255,0.15);  color: #00cfff; }
.score-orange { background: rgba(237,137,54,0.15); color: #ed8936; }

.window-info { flex: 1; min-width: 0; }
.window-title { font-size: 0.82rem; font-weight: 600; color: #f0f4ff; }
.window-meta  { font-size: 0.73rem; color: rgba(255,255,255,0.5); margin-top: 2px; }
.window-narrative { font-size: 0.72rem; font-style: italic; color: #888; margin-top: 3px; }

/* ---- Boutons rapides ---- */
.quick-btns {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 12px;
}

.btn-quick {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  color: #f0f4ff;
  padding: 12px;
  text-align: center;
  cursor: pointer;
  font-size: 0.82rem;
  font-weight: 600;
}

.btn-quick:active { background: rgba(77,255,145,0.15); }

/* ---- Spots ---- */
.spot-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  cursor: pointer;
}
.spot-row:last-child { border-bottom: none; }
.spot-row:active { opacity: 0.7; }

.spot-name { font-size: 0.85rem; font-weight: 600; color: #f0f4ff; }
.spot-city { font-size: 0.73rem; color: rgba(255,255,255,0.45); margin-top: 2px; }
.spot-score { font-size: 0.78rem; font-weight: 700; }

/* Fiche spot (push navigation) */
.spot-detail { display: none; }
.spot-detail.active { display: block; }
.spot-list-view { }
.spot-list-view.hidden { display: none; }

.back-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  background: none;
  border: none;
  color: #4dff91;
  font-size: 0.82rem;
  cursor: pointer;
  padding: 0 0 12px;
  font-weight: 600;
}

.fav-btn {
  background: none;
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 20px;
  color: rgba(255,255,255,0.6);
  font-size: 0.78rem;
  padding: 4px 10px;
  cursor: pointer;
}
.fav-btn.active { border-color: #4dff91; color: #4dff91; }

/* ---- Session form ---- */
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 0.72rem; color: #888; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.4px; }

select, input[type="text"], input[type="date"], input[type="time"], input[type="number"], textarea {
  width: 100%;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 8px;
  color: #f0f4ff;
  padding: 9px 12px;
  font-size: 0.85rem;
  outline: none;
  -webkit-appearance: none;
}

select:focus, input:focus, textarea:focus {
  border-color: rgba(77,255,145,0.5);
}

select option { background: #0d2137; color: #f0f4ff; }

/* Sélecteur étoiles 1-5 */
.star-selector { display: flex; gap: 6px; margin-top: 4px; direction: rtl; }
.star-selector input[type="radio"] { display: none; }
.star-selector label {
  font-size: 1.6rem;
  cursor: pointer;
  color: rgba(255,255,255,0.2);
  transition: color 0.1s;
  direction: ltr;
}
.star-selector input:checked + label,
.star-selector input:checked + label ~ label { color: #4dff91; }

/* ---- Bouton principal ---- */
.btn-primary {
  width: 100%;
  background: #4dff91;
  color: #0a0e27;
  border: none;
  border-radius: 10px;
  padding: 13px;
  font-size: 0.9rem;
  font-weight: 700;
  cursor: pointer;
  margin-top: 4px;
}
.btn-primary:active { opacity: 0.85; }

/* ---- Profil ---- */
.profil-avatar {
  width: 64px; height: 64px; border-radius: 50%;
  background: #4dff91; color: #0a0e27;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.8rem; font-weight: 700; margin: 0 auto 12px;
}

.board-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.board-row:last-child { border-bottom: none; }
.board-name { font-size: 0.85rem; font-weight: 600; }
.board-meta { font-size: 0.72rem; color: rgba(255,255,255,0.45); }

.session-compact {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 7px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  font-size: 0.8rem;
}
.session-compact:last-child { border-bottom: none; }

/* Config collapsible */
.config-toggle {
  background: none;
  border: none;
  color: rgba(255,255,255,0.35);
  font-size: 0.75rem;
  cursor: pointer;
  padding: 8px 0;
  width: 100%;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 6px;
}
.config-body { display: none; padding-top: 12px; }
.config-body.open { display: block; }

/* ---- Feedback messages ---- */
.msg-success {
  background: rgba(77,255,145,0.12);
  border: 1px solid rgba(77,255,145,0.3);
  border-radius: 8px;
  color: #4dff91;
  padding: 10px 14px;
  font-size: 0.82rem;
  margin-bottom: 10px;
}
.msg-error {
  background: rgba(237,100,100,0.12);
  border: 1px solid rgba(237,100,100,0.3);
  border-radius: 8px;
  color: #fc8181;
  padding: 10px 14px;
  font-size: 0.82rem;
  margin-bottom: 10px;
}

/* ---- Loading / empty states ---- */
.loading { color: rgba(255,255,255,0.4); font-size: 0.82rem; padding: 16px 0; text-align: center; }
.empty   { color: rgba(255,255,255,0.35); font-size: 0.8rem; text-align: center; padding: 20px 0; }

/* ---- Filtres spots ---- */
.filter-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.filter-row select { font-size: 0.75rem; padding: 7px 8px; }

/* ---- Date/heure côte à côte ---- */
.datetime-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    </style>
</head>
<body>
<div class="app">
  <div class="tab-content">

    <!-- ===== ACCUEIL ===== -->
    <div id="tab-accueil" class="tab-panel active">
      <div id="accueil-content">
        <div class="loading">🌊 Chargement...</div>
      </div>
    </div>

    <!-- ===== SPOTS ===== -->
    <div id="tab-spots" class="tab-panel">
      <div class="spot-list-view" id="spots-list-view">
        <div class="filter-row">
          <select id="spots-country" onchange="onSpotsCountryChange()">
            <option value="">Pays</option>
          </select>
          <select id="spots-region" onchange="onSpotsRegionChange()">
            <option value="">Région</option>
          </select>
          <select id="spots-city" onchange="filterSpots()">
            <option value="">Ville</option>
          </select>
        </div>

        <div class="card">
          <span class="section-label">⭐ Mes favoris</span>
          <div id="fav-spots-list"><div class="loading">Chargement...</div></div>
        </div>

        <div class="card">
          <span class="section-label">🌍 Tous les spots</span>
          <div id="all-spots-list"><div class="loading">Chargement...</div></div>
        </div>
      </div>

      <div class="spot-detail" id="spot-detail-view">
        <button class="back-btn" onclick="backToSpotsList()">← Retour</button>
        <div id="spot-detail-content"></div>
      </div>
    </div>

    <!-- ===== SESSION ===== -->
    <div id="tab-session" class="tab-panel">
      <div style="padding-top:8px">
        <div id="session-feedback"></div>

        <div class="card">
          <span class="section-label">📍 Spot</span>
          <select id="session-spot" required>
            <option value="">Sélectionnez un spot</option>
          </select>
        </div>

        <div class="card">
          <div class="datetime-row">
            <div class="form-group" style="margin:0">
              <label>Date</label>
              <input type="date" id="session-date" required>
            </div>
            <div class="form-group" style="margin:0">

              <input type="time" id="session-time" required>

          </div>
        </div>

        <div class="card">
          <span class="section-label">Note de la session</span>
          <div class="star-selector" id="star-selector">
            <input type="radio" name="rating" id="r5" value="5"><label for="r5">★</label>
            <input type="radio" name="rating" id="r4" value="4"><label for="r4">★</label>
            <input type="radio" name="rating" id="r3" value="3"><label for="r3">★</label>
            <input type="radio" name="rating" id="r2" value="2"><label for="r2">★</label>
            <input type="radio" name="rating" id="r1" value="1"><label for="r1">★</label>
          </div>
        </div>

        <div class="card">
          <div class="form-group" style="margin-bottom:10px">
            <label>Board (optionnel)</label>
            <select id="session-board">
              <option value="">Aucune board sélectionnée</option>
            </select>
          </div>
          <div class="form-group" style="margin:0">
            <label>Notes libres</label>
            <textarea id="session-notes" rows="3" placeholder="Comment était la session ?"></textarea>
          </div>
        </div>

        <button class="btn-primary" onclick="submitSession()">Enregistrer la session</button>
      </div>
    </div>

    <!-- ===== PROFIL ===== -->
    <div id="tab-profil" class="tab-panel">
      <div id="profil-content">
        <div class="loading">Chargement...</div>
      </div>
    </div>

  </div>

  <!-- Navigation bas -->
  <nav class="bottom-nav">
    <button class="nav-tab active" onclick="showTab('accueil', this)">
      <span class="nav-icon">🏄‍♂️</span><span class="nav-label">Accueil</span>
    </button>
    <button class="nav-tab" onclick="showTab('spots', this)">
      <span class="nav-icon">📍</span><span class="nav-label">Spots</span>
    </button>
    <button class="nav-tab" onclick="showTab('session', this)">
      <span class="nav-icon">➕</span><span class="nav-label">Session</span>
    </button>
    <button class="nav-tab" onclick="showTab('profil', this)">
      <span class="nav-icon">👤</span><span class="nav-label">Profil</span>
    </button>
  </nav>
</div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ========================================
        // GESTIONNAIRE CENTRALISÉ DE DONNÉES SURFAI
        // ========================================

        class SurfAIDataManager {
            constructor(backendUrl, supabaseClient = null) {
                this.backendUrl = backendUrl;
                this.supabase = supabaseClient;
                this.cache = {
                    weatherData: new Map(),
                    aiPreferences: null,
                    userProfile: null,
                    spots: null,
                    boards: null,
                    lastUpdate: new Map()
                };
                this.subscribers = new Map();
                this.weatherCacheTimeout = 30 * 60 * 1000; // 30 min
                this.staticCacheTimeout = 24 * 60 * 60 * 1000; // 24h
                this.currentUserId = 'demo_user';
            }

            // GESTION SPOTS
            async getSpots() {
                if (this.cache.spots && this.isCacheValid('spots', this.staticCacheTimeout)) {
                    return this.cache.spots;
                }

                if (this.supabase) {
                    try {
                        const { data: spots, error } = await this.supabase
                            .from('spots')
                            .select('*')
                            .order('country, region, city, name');

                        if (error) throw error;
                        const hierarchy = this.buildSpotHierarchy(spots);
                        this.cache.spots = hierarchy;
                        this.cache.lastUpdate.set('spots', Date.now());
                        return hierarchy;
                    } catch (error) {
                        console.warn('Erreur Supabase spots, fallback:', error);
                    }
                }

                // Fallback spots par défaut
                const defaultSpots = this.getFallbackSpots();
                this.cache.spots = defaultSpots;
                return defaultSpots;
            }

            buildSpotHierarchy(spots) {
                const hierarchy = {};
                spots.forEach(spot => {
                    if (!hierarchy[spot.country]) hierarchy[spot.country] = {};
                    if (!hierarchy[spot.country][spot.region]) hierarchy[spot.country][spot.region] = {};
                    if (!hierarchy[spot.country][spot.region][spot.city]) hierarchy[spot.country][spot.region][spot.city] = [];
                    
                    hierarchy[spot.country][spot.region][spot.city].push({
                        id: spot.id,
                        name: spot.name,
                        coords: spot.coordinates,
                        type: spot.type,
                        difficulty: spot.difficulty
                    });
                });
                return hierarchy;
            }

            async getSpotsByLevel(country = null, region = null, city = null) {
                const hierarchy = await this.getSpots();
                if (!country) return Object.keys(hierarchy);
                if (!region) return Object.keys(hierarchy[country] || {});
                if (!city) return Object.keys(hierarchy[country]?.[region] || {});
                return hierarchy[country]?.[region]?.[city] || [];
            }

            async findSpotById(spotId) {
                const hierarchy = await this.getSpots();
                for (const country of Object.values(hierarchy)) {
                    for (const region of Object.values(country)) {
                        for (const city of Object.values(region)) {
                            const spot = city.find(s => s.id === spotId);
                            if (spot) return spot;
                        }
                    }
                }
                return null;
            }

            // GESTION MÉTÉO
            async getWeatherData(spotId, forceRefresh = false) {
                const cacheKey = `weather_${spotId}`;
                
                if (!forceRefresh && this.cache.weatherData.has(spotId)) {
                    const cached = this.cache.weatherData.get(spotId);
                    if (this.isCacheValid(cacheKey, this.weatherCacheTimeout)) {
                        return cached;
                    }
                }

                try {
                    const spot = await this.findSpotById(spotId);
                    const spotName = spot ? spot.name : spotId;
                    
                    const weatherData = await this.fetchFromBackend(`/api/v1/sessions/weather/auto?spot=${spotName}`);
                    
                    if (weatherData.success) {
                        const processedData = this.processWeatherData(weatherData.weather, spot);
                        this.cache.weatherData.set(spotId, processedData);
                        this.cache.lastUpdate.set(cacheKey, Date.now());
                        
                        if (this.supabase) {
                            await this.cacheWeatherInSupabase(spotId, processedData);
                        }
                        
                        return processedData;
                    }
                } catch (error) {
                    console.warn('Backend météo indisponible:', error);
                }

                return this.getDefaultWeatherData();
            }

            async cacheWeatherInSupabase(spotId, weatherData) {
                if (!this.supabase) return;
                try {
                    await this.supabase
                        .from('weather_cache')
                        .upsert({
                            spot_id: spotId,
                            timestamp: new Date(),
                            wave_height: weatherData.waveHeight,
                            wave_period: weatherData.wavePeriod,
                            wind_speed: weatherData.windSpeed,
                            wind_direction: weatherData.windDirection,
                            tide: weatherData.tide,
                            water_temp: weatherData.waterTemp,
                            confidence: weatherData.confidence
                        });
                } catch (error) {
                    console.warn('Erreur cache météo Supabase:', error);
                }
            }

            // GESTION PROFIL & BOARDS
            async getUserProfile(userId) {
                if (this.cache.userProfile && this.isCacheValid('profile', this.staticCacheTimeout)) {
                    return this.cache.userProfile;
                }

                if (this.supabase) {
                    try {
                        const { data: profile, error } = await this.supabase
                            .from('user_profiles')
                            .select('*')
                            .eq('user_id', userId)
                            .single();

                        if (error && error.code !== 'PGRST116') throw error;
                        this.cache.userProfile = profile || this.getDefaultProfile();
                        this.cache.lastUpdate.set('profile', Date.now());
                        return this.cache.userProfile;
                    } catch (error) {
                        console.warn('Erreur profil Supabase:', error);
                    }
                }

                return this.getDefaultProfile();
            }

            async getUserBoards(userId) {
                if (this.cache.boards && this.isCacheValid('boards', this.staticCacheTimeout)) {
                    return this.cache.boards;
                }

                if (this.supabase) {
                    try {
                        const { data: boards, error } = await this.supabase
                            .from('boards')
                            .select('*')
                            .eq('user_id', userId)
                            .order('created_at', { ascending: false });

                        if (error) throw error;
                        this.cache.boards = boards || [];
                        this.cache.lastUpdate.set('boards', Date.now());
                        return this.cache.boards;
                    } catch (error) {
                        console.warn('Erreur boards Supabase:', error);
                    }
                }

                // Fallback localStorage
                const localBoards = JSON.parse(localStorage.getItem('surfai_boards') || '[]');
                this.cache.boards = localBoards;
                return localBoards;
            }

            async saveUserBoard(userId, board) {
                if (this.supabase) {
                    try {
                        const { data, error } = await this.supabase
                            .from('boards')
                            .insert([{
                                user_id: userId,
                                name: board.name,
                                size: board.size,
                                type: board.type,
                                shaper: board.shaper
                            }])
                            .select();

                        if (error) throw error;
                        this.cache.boards = null;
                        return data;
                    } catch (error) {
                        console.warn('Erreur sauvegarde board Supabase:', error);
                    }
                }

                // Fallback localStorage
                const boards = JSON.parse(localStorage.getItem('surfai_boards') || '[]');
                const newBoard = { ...board, id: Date.now() };
                boards.push(newBoard);
                localStorage.setItem('surfai_boards', JSON.stringify(boards));
                this.cache.boards = null;
                return [newBoard];
            }

            // PRÉDICTIONS PERSONNALISÉES
            async getPersonalizedPrediction(userId, spotId, boardId = null) {
                try {
                    const [weatherData, aiPreferences, profile, boards] = await Promise.all([
                        this.getWeatherData(spotId),
                        this.getAIPreferences(userId),
                        this.getUserProfile(userId),
                        this.getUserBoards(userId)
                    ]);

                    const selectedBoard = boardId ? boards.find(b => b.id == boardId) : null;
                    const score = this.calculatePersonalizedScore(weatherData, aiPreferences, profile, selectedBoard);

                    return {
                        spotId,
                        boardId,
                        weather: weatherData,
                        score: score,
                        recommendation: this.generateRecommendation(score, weatherData, profile),
                        timestamp: new Date().toISOString()
                    };
                } catch (error) {
                    console.error('Erreur prédiction personnalisée:', error);
                    throw error;
                }
            }

            calculatePersonalizedScore(weather, aiPrefs, profile, board) {
                let score = 5.0;
                
                // Facteur conditions météo (40%)
                if (aiPrefs && aiPrefs.wavePreferences) {
                    const waveOptimal = aiPrefs.wavePreferences.optimalHeight.value;
                    const waveDiff = Math.abs(weather.waveHeight - waveOptimal);
                    score -= waveDiff * 1.5;
                }
                
                if (aiPrefs && aiPrefs.windPreferences) {
                    const windOptimal = aiPrefs.windPreferences.optimalSpeed.value;
                    const windDiff = Math.abs(weather.windSpeed - windOptimal);
                    score -= windDiff * 0.08;
                }

                // Facteur niveau utilisateur (30%)
                const levelFactor = this.getLevelFactor(profile.level, weather);
                score *= levelFactor;

                // Facteur board adaptée (20%)
                if (board) {
                    const boardFactor = this.getBoardFactor(board, weather, profile);
                    score *= boardFactor;
                }

                // Facteur confiance données (10%)
                score *= (weather.confidence || 0.7);

                return Math.max(1, Math.min(10, score));
            }

            getBoardFactor(board, weather, profile) {
                let factor = 1.0;
                
                const boardAdaptation = {
                    'longboard': { minWave: 0.3, maxWave: 1.5, skillBonus: 0.1 },
                    'shortboard': { minWave: 1.0, maxWave: 4.0, skillPenalty: 0.2 },
                    'fish': { minWave: 0.5, maxWave: 2.0, speedBonus: 0.15 },
                    'midlength': { minWave: 0.6, maxWave: 2.5, versatile: 0.1 }
                };

                const adaptation = boardAdaptation[board.type];
                if (adaptation) {
                    if (weather.waveHeight >= adaptation.minWave && weather.waveHeight <= adaptation.maxWave) {
                        factor += 0.1;
                    }
                    
                    if (adaptation.skillBonus && profile.level === 'beginner') {
                        factor += adaptation.skillBonus;
                    }
                    
                    if (adaptation.skillPenalty && profile.level === 'beginner') {
                        factor -= adaptation.skillPenalty;
                    }
                }
                
                return Math.max(0.7, Math.min(1.3, factor));
            }

                    this.cache.lastUpdate.set('ai_prefs', Date.now());

                  const date = new Date(w.date).toLocaleDateString('fr-FR', { weekday: 'short', day: 'numeric', month: 'short' });
                  return `
                    <div class="window-row">
                      <div class="score-badge ${scoreCls}">${w.score}</div>
                      <div class="window-info">
                        <div class="window-title">${date} · ${w.timeWindow}</div>
                        <div class="window-meta">🌊 ${(w.conditions?.waveHeight || 0).toFixed(1)}m · 💨 ${Math.round(w.conditions?.windSpeed || 0)}km/h</div>
                        <div class="window-narrative">${w.narrative || ''}</div>

                    </div>`;

            // Sessions passées sur ce spot
            let sessionsHtml = '<div class="empty">Aucune session ici.</div>';

            // Conditions idéales (depuis données spot si disponibles)
            let conditionsHtml = '';
            try {

              let spotData = null;
              Object.values(allSpots).forEach(regions => {
                Object.values(regions).forEach(cities => {
                  Object.values(cities).forEach(spots => {
                    const found = spots.find(s => s.id === spotId);
                    if (found) spotData = found;
                  });
                });
              });
              if (spotData && (spotData.ideal_wind_direction || spotData.ideal_swell_min || spotData.ideal_tide)) {
                const windLabel  = spotData.ideal_wind_direction ? '💨 ' + spotData.ideal_wind_direction : '';
                const swellLabel = (spotData.ideal_swell_min || spotData.ideal_swell_max)
                  ? '🌊 ' + (spotData.ideal_swell_min || '?') + '–' + (spotData.ideal_swell_max || '?') + 'm' : '';
                const tideLabel  = spotData.ideal_tide ? '🌙 Marée ' + spotData.ideal_tide : '';
                const items = [windLabel, swellLabel, tideLabel].filter(Boolean);
                if (items.length) {
                  conditionsHtml = `
                    <div class="card">
                      <span class="section-label">✅ Conditions idéales</span>
                      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:4px">
                        ${items.map(i => `<span style="background:rgba(77,255,145,0.1);border:1px solid rgba(77,255,145,0.2);border-radius:6px;padding:4px 10px;font-size:0.78rem;color:#4dff91">${i}</span>`).join('')}
                      </div>
                    </div>`;
                }
              }
            } catch (e) { /* silencieux */ }

            // Vérifier si spot favori
            const favContainer = document.getElementById('fav-spots-list');
            const isFav = favContainer && favContainer.innerHTML.includes(spotId);

            container.innerHTML = `
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">

        async function populateSessionSpots() {
          const select = document.getElementById('session-spot');
          select.innerHTML = '<option value="">Sélectionnez un spot</option>';
          try {
            const userId = dataManager.currentUserId;
            let favSpots = [];
            if (userId && userId !== 'demo_user') {
              const res = await fetch(`${backendUrl}/api/v1/spots?favorites=true&userId=${userId}`);
              const data = await res.json();
              favSpots = data.spots || [];
            }
            if (favSpots.length) {
              const grpFav = document.createElement('optgroup');
              grpFav.label = '⭐ Mes favoris';
              favSpots.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s.id; opt.textContent = s.name;
                grpFav.appendChild(opt);
              });
              select.appendChild(grpFav);
            }
            const allSpots = await dataManager.getSpots();
            const grpAll = document.createElement('optgroup');
            grpAll.label = '🌍 Tous les spots';
            const favIds = new Set(favSpots.map(s => s.id));
            Object.values(allSpots).forEach(regions => {
              Object.values(regions).forEach(cities => {
                Object.values(cities).forEach(spots => {
                  spots.forEach(s => {
                    if (!favIds.has(s.id)) {
                      const opt = document.createElement('option');
                      opt.value = s.id; opt.textContent = s.name + (s.city ? ' (' + s.city + ')' : '');
                      grpAll.appendChild(opt);
                    }
                  });
                });
              });
            });
            select.appendChild(grpAll);
          } catch (e) {
            console.error('Erreur chargement spots session:', e);
          }
        }

        async function submitSession() {
          const spotId  = document.getElementById('session-spot').value;
          const date    = document.getElementById('session-date').value;
          const time    = document.getElementById('session-time').value;
          const notes   = document.getElementById('session-notes').value;
          const boardId = document.getElementById('session-board').value;
          const ratingEl = document.querySelector('input[name="rating"]:checked');
          const rating = ratingEl ? parseInt(ratingEl.value) : null;

          if (!spotId || !date || !time || !rating) {
            showMessage('error', 'Veuillez remplir : spot, date, heure et note.', 'session-feedback');
            return;
          }

          try {
            const sessionData = {
              userId:  dataManager.currentUserId,
              spotId,
              date,
              time,
              rating,
              notes: notes || '',
              boardId: boardId || null
            };

            const response = await fetch(`${backendUrl}/api/v1/sessions/quick`, {
              method:  'POST',
              headers: { 'Content-Type': 'application/json' },
              body:    JSON.stringify(sessionData)
            });
            const result = await response.json();
            if (!result.success) throw new Error(result.error || 'Erreur serveur');

            const meteoMsg = result.meteo ? '— météo capturée automatiquement' : '';
            showMessage('success', '✅ Session enregistrée ' + meteoMsg, 'session-feedback');

            document.getElementById('session-spot').value = '';
            document.querySelectorAll('input[name="rating"]').forEach(r => r.checked = false);
            document.getElementById('session-notes').value = '';
            document.getElementById('session-board').value = '';
            dataManager.cache.aiPreferences = null;
            userData.sessions = [];
            await loadSessions();

          } catch (error) {
            showMessage('error', '❌ Erreur: ' + error.message, 'session-feedback');
          }
        }

            let html = '';
            
            Object.entries(spotsHierarchy).forEach(([country, regions]) => {
                Object.entries(regions).forEach(([region, cities]) => {
                    Object.entries(cities).forEach(([city, spots]) => {
                        spots.forEach(spot => {
                            html += `

                                    <h4>🏄‍♂️ ${spot.name}</h4>
                                    <p>📍 ${city}, ${region}, ${country}</p>
                                    <p style="font-size: 0.9rem; color: #666;">

                                    </p>
                                </div>
                            `;
                        });
                    });
                });
            });
            
            allSpotsList.innerHTML = html;
        }

        function displayFilteredSpots(spotsHierarchy, filterCountry, filterRegion, filterCity) {
            const allSpotsList = document.getElementById('all-spots-list');
            let html = '';
            
            Object.entries(spotsHierarchy).forEach(([country, regions]) => {
                if (filterCountry && country !== filterCountry) return;
                
                Object.entries(regions).forEach(([region, cities]) => {
                    if (filterRegion && region !== filterRegion) return;
                    
                    Object.entries(cities).forEach(([city, spots]) => {
                        if (filterCity && city !== filterCity) return;
                        
                        spots.forEach(spot => {
                            html += `
                                <div class="card">

        function generateMultiDayPredictions(userPrefs, baseConditions, days) {
            const predictions = [];
            
            for (let i = 0; i < days; i++) {
                const date = new Date();
                date.setDate(date.getDate() + i + 1);
                
                const waveHeight = baseConditions.waveHeight + (Math.random() - 0.5) * 0.6;
                const windSpeed = baseConditions.windSpeed + (Math.random() - 0.5) * 10;
                
                let score = 5.0;
                const waveDiff = Math.abs(waveHeight - (userPrefs.wavePreferences?.optimalHeight?.value || 1.5));
                const windDiff = Math.abs(windSpeed - (userPrefs.windPreferences?.optimalSpeed?.value || 15));
                
                score -= waveDiff * 1.5;
                score -= windDiff * 0.08;
                score = Math.max(1, Math.min(5, score));
                
                predictions.push({
                    date: date.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' }),
                    conditions: {
                        waveHeight: Math.max(0.3, waveHeight),
                        windSpeed: Math.max(5, windSpeed),
                        windDirection: baseConditions.windDirection
                    },
                    score: score,
                    recommendation: score >= 4 ? "🔥 Session exceptionnelle prévue !" : 
                                   score >= 3 ? "👍 Bonnes conditions pour vous" :
                                   "⚠️ Conditions moyennes"
                });
            }
            
            return predictions;
        }

        function createPredictionCard(prediction, userPrefs) {
            let cardClass = 'forecast-card';
            let scoreClass = 'forecast-score';
            
            if (prediction.score >= 4) {
                cardClass += ' excellent';
                scoreClass += ' excellent';
            } else if (prediction.score >= 3) {
                cardClass += ' good';
                scoreClass += ' good';
            } else {
                cardClass += ' average';
                scoreClass += ' average';
            }
            
            return `
                <div class="${cardClass}">
                    <div class="forecast-header">
                        <span class="forecast-date">${prediction.date}</span>
                        <span class="${scoreClass}">${prediction.score.toFixed(1)}/5</span>
                    </div>
                    
                    <div class="forecast-conditions">
                        <div class="condition">🌊 ${prediction.conditions.waveHeight.toFixed(1)}m</div>
                        <div class="condition">💨 ${Math.round(prediction.conditions.windSpeed)}km/h</div>
                        <div class="condition">🧭 ${prediction.conditions.windDirection}</div>
                    </div>
                    
                    <div class="prediction-info">
                        <div class="prediction-recommendation">
                            ${prediction.recommendation}
                        </div>
                        <div style="margin-top: 5px; font-size: 0.8rem; color: #666;">
                            Score harmonisé basé sur ${userPrefs ? userPrefs.totalSessions : 'vos'} sessions analysées
                        </div>
                    </div>
                </div>
            `;
        }

                sessionsList.innerHTML = `<div style="margin-bottom:12px;color:#666;font-size:0.9rem">${sessions.length} session${sessions.length > 1 ? 's' : ''} enregistrée${sessions.length > 1 ? 's' : ''}</div>${html}`;
            } catch (error) {
                console.error('Erreur chargement sessions:', error);
            }
        }

        function loadSpots() {
            const favoritesList = document.getElementById('favorite-spots-list');
            favoritesList.innerHTML = `
                <div class="card">
                    <h4>⭐ Vos spots favoris</h4>
                    <p>Navigation hiérarchique disponible ci-dessus</p>
                </div>
            `;
        }

        function loadProfile() {
            // Guard: if new 4-tab layout is active, let loadProfilTab() handle boards rendering
            if (document.getElementById('tab-profil')) return;

            const boardsList = document.getElementById('user-boards-list');
            if (!boardsList) return;

            if (userData.boards && userData.boards.length > 0) {
                const boardsHtml = userData.boards.map(board => `
                    <div class="card">
                        <h4>${board.name}</h4>
                        <p>📏 Taille: ${board.size} • 🏄‍♂️ Type: ${board.type}</p>
                        <p>🔨 Shaper: ${board.shaper}</p>
                    </div>
                `).join('');
                // Commented out to avoid overwriting dark-theme board list
                // boardsList.innerHTML = boardsHtml;
            } else {
                // Commented out to avoid overwriting dark-theme board list
                // boardsList.innerHTML = `
                //     <div class="card">
                //         <p>🏄‍♂️ Ajoutez vos boards ci-dessus.</p>
                //         <p>Elles seront intégrées dans les prédictions IA !</p>
                //     </div>
                // `;
            }
        }

        function saveProfile() {
            const nickname = document.getElementById('profile-nickname').value;
            const level = document.getElementById('profile-level').value;
            const waveMin = document.getElementById('profile-wave-min').value;
            const waveMax = document.getElementById('profile-wave-max').value;

            // Spot de base pour la météo accueil
            const homeSpotSelect = document.getElementById('profile-home-spot');
            if (homeSpotSelect && homeSpotSelect.value) {
                const opt = homeSpotSelect.options[homeSpotSelect.selectedIndex];
                localStorage.setItem('home_spot', JSON.stringify({
                    id:   homeSpotSelect.value,
                    name: opt.text.split(' — ')[0],
                    lat:  parseFloat(opt.dataset.lat),
                    lng:  parseFloat(opt.dataset.lng)
                }));
            }

            userData.profile = {
                nickname,
                level,
                wavePreferences: {
                    min: parseFloat(waveMin) || 0.8,
                    max: parseFloat(waveMax) || 2.5
                }
            };

            localStorage.setItem('surfai_profile', JSON.stringify(userData.profile));
            showMessage('success', 'Profil sauvegardé !');

            // Recharger la home pour appliquer le nouveau spot de base
            loadAccueil();
        }

        function analyzePatterns() {
            const patternsDiv = document.getElementById('patterns');
            patternsDiv.innerHTML = '<div class="loading">🧠 Analyse patterns harmonisée...</div>';
            
            setTimeout(() => {
                patternsDiv.innerHTML = `
                    <div class="success">
                        <h4>🎯 Patterns harmonisés détectés :</h4>
                        <ul style="margin-left: 20px; margin-top: 10px;">
                            <li>🌊 Conditions optimales analysées par l'IA v2.0</li>
                            <li>💨 Préférences vent basées sur vos sessions</li>
                            <li>📍 Spots favoris selon géolocalisation</li>
                            <li>🏄‍♂️ Boards adaptées aux conditions</li>
                        </ul>
                        <p style="margin-top: 15px;">
                            <strong>💡 Système harmonisé :</strong> 
                            Backend + Supabase + IA pour des prédictions ultra-précises !
                        </p>
                    </div>
                `;
            }, 2000);
        }

        function showMessage(type, message, containerId) {
          const cid = containerId || 'session-feedback';
          const el = document.getElementById(cid);
          if (!el) return;
          const cls = type === 'success' ? 'msg-success' : 'msg-error';
          el.innerHTML = `<div class="${cls}">${message}</div>`;
          if (type === 'success') setTimeout(() => { el.innerHTML = ''; }, 3500);
        }

        function updateAppStatus() {
            const statusDiv = document.getElementById('app-status');
            if (!statusDiv) return;
            statusDiv.innerHTML = `
                <p>🟢 Backend: Connecté et fonctionnel</p>
                <p>🟢 IA Engine: v2.0 Opérationnel</p>
                <p>${supabaseClient ? '🟢' : '🔴'} Supabase: ${supabaseClient ? 'Connecté' : 'Non configuré'}</p>
                <p>🟢 Données: Harmonisées et cohérentes</p>
            `;
        }

        function updateDashboard() {
            document.getElementById('total-sessions').textContent = userData.sessions.length;
            document.getElementById('avg-rating').textContent = userData.sessions.length > 0 ? 
                (userData.sessions.reduce((sum, s) => sum + s.rating, 0) / userData.sessions.length).toFixed(1) : '-';
            document.getElementById('favorite-spots').textContent = userData.favoriteSpots.length;
        }
    </script>
</body>
</html>
