          const date    = document.getElementById('session-date').value;
          const time    = document.getElementById('session-time').value;
          const notes   = document.getElementById('session-notes').value;
          const boardId = document.getElementById('session-board').value;
          const ratingEl = document.querySelector('input[name="rating"]:checked');
          const rating = ratingEl ? parseInt(ratingEl.value) : null;

          if (!spotId || !date || !time || !rating) {
            showMessage('error', 'Veuillez remplir : spot, date, heure et note.', 'session-feedback');
            return;
          }

          try {
            const sessionData = {
              userId:  dataManager.currentUserId,
              spotId,
              date,
              time,
              rating,
              notes: notes || '',
              boardId: boardId || null
            };

            const response = await fetch(`${backendUrl}/api/v1/sessions/quick`, {
              method:  'POST',
              headers: { 'Content-Type': 'application/json' },
              body:    JSON.stringify(sessionData)
            });
            const result = await response.json();
            if (!result.success) throw new Error(result.error || 'Erreur serveur');

            // Capture spot name/city BEFORE form reset
            const capturedSpotName = document.getElementById('session-spot-display')?.textContent?.trim() || '';
            let capturedSpotCity = '';
            try {
              const { data: spotData } = await supabaseClient.from('spots').select('city').eq('id', spotId).single();
              capturedSpotCity = spotData?.city || '';
            } catch(e) { /* ignore */ }

            // Build share data before reset
            const shareSessionData = {
              spotName: capturedSpotName,
              spotCity: capturedSpotCity,
              date: date,
              rating: rating,
              nickname: (userData.profile && (userData.profile.nickname || userData.profile.pseudo)) || '',
              meteo: result.meteo || null
            };

            // Reset form
            document.getElementById('session-spot').value = '';
            const spotDisplay = document.getElementById('session-spot-display');
            if (spotDisplay) { spotDisplay.textContent = 'Choisir un spot...'; spotDisplay.style.color = 'rgba(255,255,255,0.4)'; }
            document.querySelectorAll('input[name="rating"]').forEach(r => r.checked = false);
            document.getElementById('session-notes').value = '';
            document.getElementById('session-board').value = '';
            dataManager.cache.aiPreferences = null;
            userData.sessions = [];
            await loadSessions();

            // Show share confirmation overlay instead of just a toast
            showSessionConfirmation(shareSessionData);

          } catch (error) {
            showMessage('error', '❌ Erreur: ' + error.message, 'session-feedback');
          }
        }

        function getBoardTypeIcon(type) {
          const icons = { shortboard:'🏄', fish:'🐟', midlength:'🌊', longboard:'🛹', gun:'🎯', funboard:'😎', hybrid:'⚡', foil:'🪁', sup:'🚣' };
          return icons[type] || '🏄';
        }

        function getBoardSessionStats(boardId) {
          const sessions = (userData.sessions || []).filter(s => s.board_id == boardId);
          if (!sessions.length) return { count: 0, lastDate: null };
          const sorted = sessions.sort((a,b) => new Date(b.date) - new Date(a.date));
          const last = new Date(sorted[0].date);
          const diffDays = Math.round((Date.now() - last) / 86400000);
          const lastTxt = diffDays === 0 ? "aujourd'hui" : diffDays === 1 ? 'hier' : `il y a ${diffDays}j`;
          return { count: sessions.length, lastDate: lastTxt };
        }

        function formatSweetSpot(b) {
          const parts = [];
          if (b.sweet_spot_wave_min || b.sweet_spot_wave_max) {
            const min = b.sweet_spot_wave_min || '?';
            const max = b.sweet_spot_wave_max || '?';
            parts.push(`${min}-${max}m`);
          }
          if (b.sweet_spot_wind && b.sweet_spot_wind !== 'any') parts.push(b.sweet_spot_wind);
          if (b.sweet_spot_tide && b.sweet_spot_tide !== 'any') parts.push('marée ' + b.sweet_spot_tide);
          return parts.length ? parts.join(' · ') : null;
        }

        async function deleteBoard(boardId) {
          if (!confirm('Supprimer cette board ?')) return;
          try {
            if (dataManager.supabase) {
              // Détacher les sessions liées à cette board
              await dataManager.supabase
                .from('sessions')
                .update({ board_id: null })
                .eq('board_id', boardId);
              // Puis supprimer la board
              const { error } = await dataManager.supabase
                .from('boards')
                .delete()
                .eq('id', boardId)
                .eq('user_id', dataManager.currentUserId);
              if (error) throw new Error(error.message);
            } else {
              const boards = JSON.parse(localStorage.getItem('surfai_boards') || '[]');
              localStorage.setItem('surfai_boards', JSON.stringify(boards.filter(b => b.id != boardId)));
            }
            dataManager.cache.boards = null;
            await loadBoardsTab();
          } catch(e) {
            showMessage('error', 'Erreur suppression : ' + e.message);
          }
        }

        async function uploadAvatar(input) {
          const file = input.files[0];
          if (!file) return;
          // Vérifier taille (max 2MB)
          if (file.size > 2 * 1024 * 1024) {
            showMessage('error', 'Image trop lourde (max 2 MB)');
            return;
          }
          try {
            if (supabaseClient) {
              const userId = dataManager.currentUserId;
              const ext = file.name.split('.').pop();
              const path = `avatars/${userId}.${ext}`;
              const { error: uploadError } = await supabaseClient.storage
                .from('avatars')
                .upload(path, file, { upsert: true });
              if (uploadError) throw uploadError;
              const { data: urlData } = supabaseClient.storage.from('avatars').getPublicUrl(path);
              const avatarUrl = urlData.publicUrl + '?t=' + Date.now();
              userData.profile.avatar_url = avatarUrl;
              localStorage.setItem('surfai_avatar', avatarUrl);
              loadProfilTab();
            } else {
              // Fallback localStorage avec base64
              const reader = new FileReader();
              reader.onload = () => {
                localStorage.setItem('surfai_avatar', reader.result);
                userData.profile.avatar_url = reader.result;
                loadProfilTab();
              };
              reader.readAsDataURL(file);
            }
          } catch(e) {
            // Fallback base64 si storage pas configuré
            const reader = new FileReader();
            reader.onload = () => {
              localStorage.setItem('surfai_avatar', reader.result);
              userData.profile.avatar_url = reader.result;
              loadProfilTab();
            };
            reader.readAsDataURL(file);
          }
        }

          const boardSessionData = {

            date: shaperLine ? '🔨 ' + shaperLine : '',

            nickname: '',

        async function generateBoardShareCanvas(photoFile, data, detailLine, bottomLine, mode) {
          const canvas = document.createElement('canvas');
          canvas.width = 1080;
          canvas.height = 1350;
          const ctx = canvas.getContext('2d');

          // Photo en fond
          const img = await loadImage(photoFile);
          drawImageCover(ctx, img, 0, 0, 1080, 1350);

          // Gradient overlay
          const grad = ctx.createLinearGradient(0, 500, 0, 1350);
          grad.addColorStop(0, 'rgba(10,14,39,0)');
          grad.addColorStop(0.4, 'rgba(10,14,39,0.6)');
          grad.addColorStop(1, 'rgba(10,14,39,0.92)');
          ctx.fillStyle = grad;
          ctx.fillRect(0, 500, 1080, 850);

          ctx.textAlign = 'center';
          const cx = 540;
          let curY = 1290;

          // Accent couleur selon mode
          const accentColors = { flex: '#4dff91', sell: '#ed8936', repair: '#00cfff' };
          const accent = accentColors[mode] || '#4dff91';

          // Bottom line (SurfAI ou message)
          ctx.font = '22px -apple-system, BlinkMacSystemFont, sans-serif';
          ctx.fillStyle = 'rgba(255,255,255,0.5)';
          ctx.fillText(bottomLine, cx, curY);
          curY -= 50;

          // Detail line
          if (detailLine) {
            ctx.font = '24px -apple-system, BlinkMacSystemFont, sans-serif';
            ctx.fillStyle = '#f0f4ff';
            ctx.fillText(detailLine, cx, curY);
            curY -= 50;
          }

          // Accent line (conditions / prix / description)
          if (data.meteo?.line) {
            ctx.font = 'bold 32px -apple-system, BlinkMacSystemFont, sans-serif';
            ctx.fillStyle = accent;
            ctx.fillText(data.meteo.line, cx, curY);
            curY -= 55;
          }

          // Date/shaper
          if (data.date) {
            ctx.font = '28px -apple-system, BlinkMacSystemFont, sans-serif';
            ctx.fillStyle = 'rgba(255,255,255,0.6)';
            ctx.fillText(data.date, cx, curY);
            curY -= 45;
          }

          // Subtitle (dims)
          if (data.spotCity) {
            ctx.font = '28px -apple-system, BlinkMacSystemFont, sans-serif';
            ctx.fillStyle = 'rgba(255,255,255,0.6)';
            ctx.fillText(data.spotCity, cx, curY);
            curY -= 45;
          }

          // Title (board name)
          ctx.font = 'bold 48px -apple-system, BlinkMacSystemFont, sans-serif';
          ctx.fillStyle = '#f0f4ff';
          ctx.fillText(data.spotName, cx, curY);
          curY -= 55;

          // Logo SurfAI en haut
          ctx.font = 'bold 20px -apple-system, BlinkMacSystemFont, sans-serif';
          ctx.fillStyle = 'rgba(255,255,255,0.3)';
          ctx.fillText('SurfAI', cx, 40);

          return canvas;
        }

        /* --- anciennes fonctions de partage board supprimées --- */
        function _deprecated_generateBoardCard(board, mode, extras) { /* removed */ }
        async function generateBoardCard(board, mode, extras) {
          const canvas = document.createElement('canvas');
          canvas.width = 1080;
          canvas.height = 1920;
          const ctx = canvas.getContext('2d');

          // Fond dégradé
          const grad = ctx.createLinearGradient(0, 0, 0, 1920);
          grad.addColorStop(0, '#0a0e27');
          grad.addColorStop(1, '#1a1e3a');
          ctx.fillStyle = grad;
          ctx.fillRect(0, 0, 1080, 1920);

          // Couleur accent selon le mode
          const accentColors = { flex: '#4dff91', sell: '#ed8936', repair: '#00cfff' };
          const accent = accentColors[mode];

          let y = 80;

          // Badge mode
          if (mode === 'sell') {
            ctx.fillStyle = '#ed8936';
            ctx.font = 'bold 42px -apple-system, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('À VENDRE', 540, y);
            y += 60;
          } else if (mode === 'repair') {
            ctx.fillStyle = '#00cfff';
            ctx.font = 'bold 42px -apple-system, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('🔧 BESOIN DE RÉPARATION', 540, y);
            y += 60;
          }

          // Photo de la board
          if (board.photo_url) {
            try {
              const img = new Image();
              img.crossOrigin = 'anonymous';
              await new Promise((resolve, reject) => {
                img.onload = resolve;
                img.onerror = reject;
                img.src = board.photo_url;
              });
              const imgH = 600;
              const imgW = 1080;
              const ratio = Math.min(imgW / img.width, imgH / img.height);
              const drawW = img.width * ratio;
              const drawH = img.height * ratio;
              ctx.drawImage(img, (1080 - drawW) / 2, y, drawW, drawH);
              y += drawH + 40;
            } catch(e) {
              // Placeholder si image ne charge pas
              ctx.fillStyle = 'rgba(255,255,255,0.05)';
              ctx.fillRect(90, y, 900, 500);
              ctx.fillStyle = 'rgba(255,255,255,0.2)';
              ctx.font = '120px sans-serif';
              ctx.textAlign = 'center';
              ctx.fillText(getBoardTypeIcon(board.type), 540, y + 300);
              y += 560;
            }
          } else {
            ctx.fillStyle = 'rgba(255,255,255,0.05)';
            roundRect(ctx, 90, y, 900, 400, 20);
            ctx.fill();
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            ctx.font = '120px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(getBoardTypeIcon(board.type), 540, y + 260);
            y += 440;
          }

          // Nom
          ctx.fillStyle = '#f0f4ff';
          ctx.font = 'bold 52px -apple-system, sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText(`"${board.nickname || board.name}"`, 540, y);
          y += 30;

          // Dims + type
          const dims = [board.length_ft || board.size, board.type ? board.type.charAt(0).toUpperCase() + board.type.slice(1) : ''].filter(Boolean).join(' · ');
          ctx.fillStyle = 'rgba(255,255,255,0.5)';
          ctx.font = '36px -apple-system, sans-serif';
          ctx.fillText(dims, 540, y + 30);
          y += 70;

          // Shaper
          const shaperLine = [board.shaper, board.brand].filter(Boolean).join(' — ');
          if (shaperLine) {
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.font = '32px -apple-system, sans-serif';
            ctx.fillText('🔨 ' + shaperLine, 540, y);
            y += 50;
          }

          // Volume + setup
          const techLine = [board.volume_l ? board.volume_l + 'L' : '', board.fins_setup, board.tail_shape].filter(Boolean).join(' · ');
          if (techLine) {
            ctx.fillStyle = 'rgba(255,255,255,0.35)';
            ctx.font = '30px -apple-system, sans-serif';
            ctx.fillText(techLine, 540, y);
            y += 50;
          }

          // Contenu spécifique au mode
          if (mode === 'flex') {
            // Stats sessions
            if (extras.stats?.count) {
              ctx.fillStyle = accent;
              ctx.font = '30px -apple-system, sans-serif';
              ctx.fillText(`📊 ${extras.stats.count} sessions · ${extras.stats.lastDate}`, 540, y);
              y += 45;
            }
            if (extras.sweetSpot) {
              ctx.fillStyle = accent;
              ctx.font = '30px -apple-system, sans-serif';
              ctx.fillText('🌊 Sweet spot : ' + extras.sweetSpot, 540, y);
              y += 45;
            }
          } else if (mode === 'sell') {
            if (board.condition) {
              ctx.fillStyle = 'rgba(255,255,255,0.4)';
              ctx.font = '30px -apple-system, sans-serif';
              ctx.fillText('État : ' + board.condition, 540, y);
              y += 45;
            }
            if (extras.price) {
              ctx.fillStyle = '#ed8936';
              ctx.font = 'bold 56px -apple-system, sans-serif';
              ctx.fillText(extras.price + ' €', 540, y + 10);
              y += 70;
            }
            if (extras.location) {
              ctx.fillStyle = 'rgba(255,255,255,0.5)';
              ctx.font = '30px -apple-system, sans-serif';
              ctx.fillText('📍 ' + extras.location, 540, y);
              y += 45;
            }
            if (extras.message) {
              ctx.fillStyle = 'rgba(255,255,255,0.35)';
              ctx.font = 'italic 28px -apple-system, sans-serif';
              ctx.fillText('"' + extras.message + '"', 540, y);
              y += 45;
            }
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.font = '28px -apple-system, sans-serif';
            ctx.fillText('💬 Me contacter sur SurfAI', 540, y + 20);
          } else if (mode === 'repair') {
            if (extras.location) {
              ctx.fillStyle = 'rgba(255,255,255,0.5)';
              ctx.font = '30px -apple-system, sans-serif';
              ctx.fillText('📍 ' + extras.location, 540, y);
              y += 45;
            }
            if (extras.description) {
              ctx.fillStyle = 'rgba(255,255,255,0.4)';
              ctx.font = 'italic 28px -apple-system, sans-serif';
              // Wrap text
              const words = extras.description.split(' ');
              let line = '"';
              for (const word of words) {
                if (ctx.measureText(line + word).width > 900) {
                  ctx.fillText(line, 540, y);
                  y += 36;
                  line = word + ' ';
                } else {
                  line += word + ' ';
                }
              }
              ctx.fillText(line.trim() + '"', 540, y);
              y += 45;
            }
            if (extras.urgency && extras.urgency !== 'tranquille') {
              const urgColor = extras.urgency === 'urgent' ? '#ff4d4d' : '#ed8936';
              ctx.fillStyle = urgColor;
              ctx.font = 'bold 30px -apple-system, sans-serif';
              ctx.fillText('⚡ ' + extras.urgency.toUpperCase(), 540, y);
              y += 45;
            }
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.font = '28px -apple-system, sans-serif';
            ctx.fillText('💬 Contactez-moi sur SurfAI', 540, y + 20);
          }

          // Logo SurfAI en bas
          ctx.fillStyle = accent;
          ctx.font = 'bold 36px -apple-system, sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText('SurfAI 🏄', 540, 1850);

          // Afficher preview + bouton download
          showBoardCardPreview(canvas);
        }

        function roundRect(ctx, x, y, w, h, r) {
          ctx.beginPath();
          ctx.moveTo(x + r, y);
          ctx.lineTo(x + w - r, y);
          ctx.quadraticCurveTo(x + w, y, x + w, y + r);
          ctx.lineTo(x + w, y + h - r);
          ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
          ctx.lineTo(x + r, y + h);
          ctx.quadraticCurveTo(x, y + h, x, y + h - r);
          ctx.lineTo(x, y + r);
          ctx.quadraticCurveTo(x, y, x + r, y);
          ctx.closePath();
        }

        async function uploadBoardPhotoFile(file) {
          if (file.size > 2 * 1024 * 1024) { showMessage('error', 'Image trop lourde (max 2 MB)'); return null; }
          try {
            if (supabaseClient) {
              const userId = dataManager.currentUserId;
              const ext = file.name.split('.').pop();
              const path = `boards/${userId}/${Date.now()}.${ext}`;
              const { error } = await supabaseClient.storage.from('avatars').upload(path, file, { upsert: true });
              if (error) throw error;
              const { data: urlData } = supabaseClient.storage.from('avatars').getPublicUrl(path);
              return urlData.publicUrl + '?t=' + Date.now();
            }
          } catch(e) { /* fallback */ }
          // Fallback base64
          return new Promise(resolve => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.readAsDataURL(file);
          });
        }

        function updateBackendStatus(connected, message) {
            const statusDiv = document.getElementById('backend-status');
            const indicator = document.getElementById('backend-indicator');
            const messageEl = document.getElementById('backend-message');

            if (connected) {
                if (statusDiv) statusDiv.className = 'backend-status connected';
                if (indicator) indicator.textContent = '🟢';
            } else {
                if (statusDiv) statusDiv.className = 'backend-status error';
                if (indicator) indicator.textContent = '🔴';
            }

            if (messageEl) messageEl.textContent = message;

                    throw new Error(`Backend non accessible (${healthResponse.status})`);
                }
                
                const aiResponse = await fetch(`${url}/api/v1/ai/test`);
                const aiData = await aiResponse.json();
                
                const weatherResponse = await fetch(`${url}/api/v1/sessions/weather/auto?spot=Biarritz`);
                const weatherData = await weatherResponse.json();
                
                resultDiv.innerHTML = `
                    <div class="success">

        // ========================================
        // FONCTIONS UTILITAIRES ET NAVIGATION
        // ========================================

        function showSessionView(view) {
          document.getElementById('session-add-view').style.display = view === 'add' ? '' : 'none';
          document.getElementById('session-history-view').style.display = view === 'history' ? '' : 'none';
          document.getElementById('btn-add-session').classList.toggle('active', view === 'add');
          document.getElementById('btn-history').classList.toggle('active', view === 'history');
          if (view === 'history') renderSessionHistory();
        }

        let _sessionHistorySort = 'date'; // 'date', 'rating', 'spot'
        let _sessionHistoryShowAll = false;

        function renderSessionHistory() {
          const container = document.getElementById('session-history-view');
          if (!container) return;
          let sessions = [...(userData.sessions || [])];
          if (!sessions.length) {
            container.innerHTML = '<div class="empty" style="padding-top:24px">Aucune session enregistrée.</div>';
            return;
          }

          // Tri
          if (_sessionHistorySort === 'rating') {
            sessions.sort((a, b) => (b.rating || 0) - (a.rating || 0));
          } else if (_sessionHistorySort === 'spot') {
            sessions.sort((a, b) => (a.spots?.name || '').localeCompare(b.spots?.name || ''));
          }
          // 'date' = déjà trié par défaut (du backend)

          // Filtrer aux 3 derniers mois sauf si "voir tout"
          const threeMonthsAgo = new Date();
          threeMonthsAgo.setMonth(threeMonthsAgo.getMonth() - 3);
          const filtered = _sessionHistoryShowAll ? sessions : sessions.filter(s => new Date(s.date) >= threeMonthsAgo);
          const hasMore = !_sessionHistoryShowAll && filtered.length < sessions.length;

          // Chips tri
          const sortChips = `<div style="display:flex;gap:8px;margin-bottom:10px">
            <div onclick="_sessionHistorySort='date';renderSessionHistory()" style="padding:6px 14px;border-radius:20px;font-size:0.8rem;cursor:pointer;border:1px solid ${_sessionHistorySort==='date'?'#4dff91':'rgba(255,255,255,0.15)'};background:${_sessionHistorySort==='date'?'rgba(77,255,145,0.15)':'rgba(255,255,255,0.06)'};color:${_sessionHistorySort==='date'?'#4dff91':'rgba(255,255,255,0.4)'}">Date</div>
            <div onclick="_sessionHistorySort='rating';renderSessionHistory()" style="padding:6px 14px;border-radius:20px;font-size:0.8rem;cursor:pointer;border:1px solid ${_sessionHistorySort==='rating'?'#4dff91':'rgba(255,255,255,0.15)'};background:${_sessionHistorySort==='rating'?'rgba(77,255,145,0.15)':'rgba(255,255,255,0.06)'};color:${_sessionHistorySort==='rating'?'#4dff91':'rgba(255,255,255,0.4)'}">★ Note</div>
            <div onclick="_sessionHistorySort='spot';renderSessionHistory()" style="padding:6px 14px;border-radius:20px;font-size:0.8rem;cursor:pointer;border:1px solid ${_sessionHistorySort==='spot'?'#4dff91':'rgba(255,255,255,0.15)'};background:${_sessionHistorySort==='spot'?'rgba(77,255,145,0.15)':'rgba(255,255,255,0.06)'};color:${_sessionHistorySort==='spot'?'#4dff91':'rgba(255,255,255,0.4)'}">Spot</div>
          </div>`;

          const rows = filtered.map(s => {
            const date = new Date(s.date).toLocaleDateString('fr-FR', { day: 'numeric', month: 'short', year: '2-digit' });
            const spot = s.spots?.name || '?';
            const stars = '★'.repeat(Math.min(s.rating || 0, 5));
            const wh = s.meteo?.waveHeight;
            const meteo = wh != null ? ` · 🌊 ${Number(wh).toFixed(1)}m` : '';
            return `<div class="session-compact">
              <div>
                <div style="font-size:0.82rem;color:#f0f4ff">${date} · ${spot}</div>
                <div style="font-size:0.72rem;color:rgba(255,255,255,0.45)">${meteo}</div>
              </div>
              <span style="color:#4dff91;font-size:0.78rem">${stars}</span>
            </div>`;
          }).join('');

          const moreBtn = hasMore ? `<button onclick="_sessionHistoryShowAll=true;renderSessionHistory()" style="width:100%;padding:10px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:rgba(255,255,255,0.5);cursor:pointer;font-size:0.8rem;margin-top:8px">Voir toutes les sessions (${sessions.length})</button>` : '';

          container.innerHTML = `
            ${sortChips}
            <div class="card">
              <span class="section-label">📋 ${filtered.length} session${filtered.length > 1 ? 's' : ''}${!_sessionHistoryShowAll ? ' (3 derniers mois)' : ''}</span>
              ${rows}
            </div>
            ${moreBtn}`;
        }

        function showTab(tabName, btn) {
          document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
          document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
          document.getElementById('tab-' + tabName).classList.add('active');
          if (btn) btn.classList.add('active');
          // Afficher/masquer le bandeau pick mode
          const banner = document.getElementById('spot-pick-banner');
          if (banner) banner.style.display = (_spotPickMode && tabName === 'spots') ? 'flex' : 'none';
          if (tabName !== 'spots' && tabName !== 'session') { _spotPickMode = false; }
          if (tabName === 'accueil') { loadSessions().then(() => loadAccueil()); }
          if (tabName === 'spots')   loadSpotsTab();
          if (tabName === 'session') loadSessionTab();
          if (tabName === 'profil')  loadProfilTab();
          if (tabName === 'boards')  loadBoardsTab();
        }

        async function loadSessions() {
            try {
                const userId = dataManager.currentUserId;
                if (!userId) return;
                const res = await fetch(`${backendUrl}/api/v1/sessions/list?userId=${userId}`);
                const data = await res.json();
                const sessions = data.sessions || [];
                userData.sessions = sessions;

                // Rendu legacy (sessions-list n'existe plus dans la nouvelle UI)
                const sessionsList = document.getElementById('sessions-list');
                if (!sessionsList) return;
                if (sessions.length === 0) {
                    sessionsList.innerHTML = `<div class="card"><p>🏄‍♂️ Aucune session encore enregistrée.</p></div>`;
                    return;
                }
                const html = sessions.map(s => {
                    const spotName = s.spots?.name || s.spot_id || 'Spot inconnu';
                    const date = new Date(s.date).toLocaleDateString('fr-FR', { weekday: 'short', day: 'numeric', month: 'short' });
                    const stars = '⭐'.repeat(s.rating || 0);
                    const meteo = s.meteo ? `🌊 ${s.meteo.waveHeight?.toFixed(1)}m • 💨 ${s.meteo.windSpeed?.toFixed(0)}km/h` : '';
                    const notes = s.notes ? `<p style="color:#666;font-size:0.9rem;margin-top:6px">${s.notes}</p>` : '';
                    return `
                        <div class="card" style="margin-bottom:12px;border-left:4px solid #00cfff">
                            <div style="display:flex;justify-content:space-between;align-items:center">
                                <strong>📍 ${spotName}</strong>
                                <span style="color:#666;font-size:0.9rem">${date}</span>
                            </div>
                            <div style="margin-top:6px">${stars} ${meteo}</div>
                            ${notes}
                        </div>`;
                }).join('');
                sessionsList.innerHTML = `<div style="margin-bottom:12px;color:#666;font-size:0.9rem">${sessions.length} session${sessions.length > 1 ? 's' : ''} enregistrée${sessions.length > 1 ? 's' : ''}</div>${html}`;
            } catch (error) {
                console.error('Erreur chargement sessions:', error);
            }
        }

        // ========================================
        // SESSION SHARE CARD
        // ========================================

        function formatSessionDate(dateStr) {
          const months = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
          const d = new Date(dateStr + 'T00:00:00');
          return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
        }

        function showSessionConfirmation(sessionData) {
          // Remove existing overlay if any
          const existing = document.getElementById('share-overlay');
          if (existing) existing.remove();

          const starsStr = sessionData.rating ? '★'.repeat(sessionData.rating) : '';
          const dateStr = formatSessionDate(sessionData.date);
          const spotLine = sessionData.spotCity
            ? `${sessionData.spotName} · ${sessionData.spotCity}`
            : sessionData.spotName;

          const overlay = document.createElement('div');
          overlay.id = 'share-overlay';
          overlay.innerHTML = `
            <div class="share-card">
              <div class="share-check">&#10003;</div>
              <h2>Session enregistree !</h2>
              <p class="share-spot">${spotLine}</p>
              <p class="share-meta">${dateStr}${starsStr ? ' · <span class="share-stars">' + starsStr + '</span>' : ''}</p>
              <button class="share-btn-primary" id="share-pick-photo-btn">Partager ta session</button>
              <input type="file" accept="image/*" class="share-file-input" id="share-file-input">
              <button class="share-btn-skip" id="share-skip-btn">Passer</button>
            </div>
          `;
          document.body.appendChild(overlay);

          // Bind events
          document.getElementById('share-skip-btn').addEventListener('click', () => {
            overlay.remove();
          });

          const fileInput = document.getElementById('share-file-input');
          document.getElementById('share-pick-photo-btn').addEventListener('click', () => {
            fileInput.click();
          });

          fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            await showShareCardPreview(sessionData, file);
          });
        }

        async function showShareCardPreview(sessionData, photoFile) {
          const overlay = document.getElementById('share-overlay');
          if (!overlay) return;

          // Show loading state
          overlay.querySelector('.share-card').innerHTML = '<p style="color:rgba(255,255,255,0.6)">Generation en cours...</p>';

          try {
            const canvas = await generateShareCard(photoFile, sessionData);
            const previewUrl = canvas.toDataURL('image/png');

            overlay.querySelector('.share-card').innerHTML = `
              <img src="${previewUrl}" class="share-preview-img" alt="Preview">
              <div class="share-btn-row">
                <button class="share-btn-save" id="share-save-btn">Enregistrer</button>
                <button class="share-btn-share" id="share-share-btn">Partager</button>
              </div>
              <button class="share-btn-skip" id="share-close-btn">Fermer</button>
            `;

            document.getElementById('share-close-btn').addEventListener('click', () => {
              overlay.remove();
            });

            document.getElementById('share-save-btn').addEventListener('click', () => {
              downloadShareCard(canvas, sessionData);
            });

            document.getElementById('share-share-btn').addEventListener('click', () => {
              shareCard(canvas, sessionData);
            });
          } catch (err) {
            console.error('Share card generation error:', err);
            overlay.querySelector('.share-card').innerHTML = `
              <p style="color:#ff6b6b">Erreur lors de la generation de l'image.</p>
              <button class="share-btn-skip" onclick="document.getElementById('share-overlay').remove()">Fermer</button>
            `;
          }
        }

        function loadImage(file) {
          return new Promise((resolve, reject) => {
            const img = new Image();
            img.onload = () => resolve(img);
            img.onerror = reject;
            if (file instanceof File) {
              const reader = new FileReader();
              reader.onload = (e) => { img.src = e.target.result; };
              reader.onerror = reject;
              reader.readAsDataURL(file);
            } else {
              img.src = file;
            }
          });
        }

        function drawImageCover(ctx, img, x, y, w, h) {
          const imgRatio = img.width / img.height;
          const canvasRatio = w / h;
          let sx, sy, sw, sh;
          if (imgRatio > canvasRatio) {
            sh = img.height;
            sw = sh * canvasRatio;
            sx = (img.width - sw) / 2;
            sy = 0;
          } else {
            sw = img.width;
            sh = sw / canvasRatio;
            sx = 0;
            sy = (img.height - sh) / 2;
          }
          ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
        }

        async function generateShareCard(photo, sessionData) {
          const canvas = document.createElement('canvas');
          canvas.width = 1080;
          canvas.height = 1350;
          const ctx = canvas.getContext('2d');

          // 1. Draw photo as background (crop center cover)
          const img = await loadImage(photo);
          drawImageCover(ctx, img, 0, 0, 1080, 1350);

          // 2. Gradient overlay on bottom half
          const grad = ctx.createLinearGradient(0, 600, 0, 1350);
          grad.addColorStop(0, 'rgba(10,14,39,0)');
          grad.addColorStop(0.4, 'rgba(10,14,39,0.6)');
          grad.addColorStop(1, 'rgba(10,14,39,0.9)');
          ctx.fillStyle = grad;
          ctx.fillRect(0, 600, 1080, 750);

          // 3. Text overlay — build from bottom up
          ctx.textAlign = 'center';
          const cx = 540; // center x
          let curY = 1290; // start near bottom

          // Date
          const dateStr = formatSessionDate(sessionData.date);
          ctx.font = '22px -apple-system, BlinkMacSystemFont, sans-serif';
          ctx.fillStyle = 'rgba(255,255,255,0.5)';
          ctx.fillText(dateStr, cx, curY);
          curY -= 50;

          // Rating stars + nickname line
          const parts = [];
          if (sessionData.rating) {
            parts.push('★'.repeat(sessionData.rating));
          }
          if (sessionData.nickname) {
            parts.push('@' + sessionData.nickname);
          }
          if (parts.length > 0) {
            ctx.font = '24px -apple-system, BlinkMacSystemFont, sans-serif';
            ctx.fillStyle = '#f0f4ff';
            ctx.fillText(parts.join('  ·  '), cx, curY);
            curY -= 50;
          }

          // Conditions line (meteo)
          if (sessionData.meteo) {
            const m = sessionData.meteo;
            const condParts = [];
            if (m.waveHeight != null) condParts.push(m.waveHeight + 'm');
            if (m.windSpeed != null) {
              let windStr = m.windSpeed + ' km/h';
              if (m.windDirection) windStr += ' ' + m.windDirection;
              condParts.push(windStr);
            }
            if (m.wavePeriod != null) condParts.push(m.wavePeriod + 's');
            if (condParts.length > 0) {
              ctx.font = 'bold 32px -apple-system, BlinkMacSystemFont, sans-serif';
              ctx.fillStyle = '#4dff91';
              ctx.fillText(condParts.join('  ·  '), cx, curY);
              curY -= 55;
            }
          }

          // City
          if (sessionData.spotCity) {
            ctx.font = '28px -apple-system, BlinkMacSystemFont, sans-serif';
            ctx.fillStyle = 'rgba(255,255,255,0.6)';
            ctx.fillText(sessionData.spotCity, cx, curY);
            curY -= 45;
          }

          // Spot name
          ctx.font = 'bold 48px -apple-system, BlinkMacSystemFont, sans-serif';
          ctx.fillStyle = '#f0f4ff';
          ctx.fillText(sessionData.spotName, cx, curY);
          curY -= 55;

          // SurfAI logo text
          ctx.font = 'bold 20px -apple-system, BlinkMacSystemFont, sans-serif';
          ctx.fillStyle = '#00cfff';
          ctx.fillText('SurfAI', cx, curY);

          return canvas;
        }

        function downloadShareCard(canvas, sessionData) {
          canvas.toBlob((blob) => {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            const safeName = (sessionData.spotName || 'session').replace(/[^a-zA-Z0-9]/g, '-').toLowerCase();
            a.download = `surfai-${safeName}-${sessionData.date}.png`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
          }, 'image/png');
        }

        async function shareCard(canvas, sessionData) {
          try {
            const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
            const safeName = (sessionData.spotName || 'session').replace(/[^a-zA-Z0-9]/g, '-').toLowerCase();
            const file = new File([blob], `surfai-${safeName}.png`, { type: 'image/png' });

            if (navigator.canShare && navigator.canShare({ files: [file] })) {
              await navigator.share({
                files: [file],
                title: `Session surf - ${sessionData.spotName}`,
                text: `Session a ${sessionData.spotName} via SurfAI`
              });
            } else {
              // Fallback to download
              downloadShareCard(canvas, sessionData);
            }
          } catch (e) {
            if (e.name !== 'AbortError') {
              // User didn't cancel, fallback to download
              downloadShareCard(canvas, sessionData);
            }
          }
        }

        // PWA Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }

    </script>
