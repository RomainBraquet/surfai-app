        async function checkBackendConnection() {
            try {
                const response = await fetch(`${backendUrl}/health`);
                const data = await response.json();
                
                if (response.ok) {
                    updateBackendStatus(true, 'Backend connecté et opérationnel');
                    const ind = document.getElementById('backend-status-indicator');
                    if (ind) ind.textContent = '🟢';
                    return true;
                } else {
                    throw new Error('Backend non disponible');
                }
            } catch (error) {
                updateBackendStatus(false, `Backend non accessible: ${error.message}`);
                const ind = document.getElementById('backend-status-indicator');
                if (ind) ind.textContent = '🔴';
                return false;
            }
        }

        function updateBackendStatus(connected, message) {
            const statusDiv = document.getElementById('backend-status');
            const indicator = document.getElementById('backend-indicator');
            const messageEl = document.getElementById('backend-message');

            if (connected) {
                if (statusDiv) statusDiv.className = 'backend-status connected';
                if (indicator) indicator.textContent = '🟢';
            } else {
                if (statusDiv) statusDiv.className = 'backend-status error';
                if (indicator) indicator.textContent = '🔴';
            }

            if (messageEl) messageEl.textContent = message;
        }

        async function testBackendConnection() {
            const url = document.getElementById('backend-url').value;
            const apiKey = document.getElementById('backend-api-key').value;
            const resultDiv = document.getElementById('backend-test-result');
            
            resultDiv.innerHTML = '<div class="loading">🧪 Test en cours...</div>';
            
            try {
                backendUrl = url;
                backendApiKey = apiKey;
                localStorage.setItem('backend_url', url);
                localStorage.setItem('backend_api_key', apiKey);
                
                // Mettre à jour gestionnaire centralisé
                dataManager.backendUrl = url;
                
                const healthResponse = await fetch(`${url}/health`);
                const healthData = await healthResponse.json();
                
                if (!healthResponse.ok) {
                    throw new Error(`Backend non accessible (${healthResponse.status})`);
                }
                
                const aiResponse = await fetch(`${url}/api/v1/ai/test`);
                const aiData = await aiResponse.json();
                
                const weatherResponse = await fetch(`${url}/api/v1/sessions/weather/auto?spot=Biarritz`);
                const weatherData = await weatherResponse.json();
                
                resultDiv.innerHTML = `
                    <div class="success">
                        ✅ Backend SurfAI connecté !<br>
                        🥼 Health: ${healthData.status}<br>
                        🤖 IA Engine: ${aiData.status === 'UPGRADED_TO_V2' ? '✅ v2.0 Fonctionnel' : '⚠️ Basique'}<br>
                        🌊 Météo Auto: ${weatherData.success ? '✅ Fonctionnel' : '❌ Erreur'}<br>
                        📊 Confiance météo: ${weatherData.weather ? Math.round(weatherData.weather.confidence * 100) + '%' : 'N/A'}
                    </div>
                `;
                
                updateBackendStatus(true, 'Backend SurfAI v2.0 connecté et fonctionnel');
                updateAppStatus();
                
            } catch (error) {
                console.error('Erreur test backend:', error);
                resultDiv.innerHTML = `
                    <div class="error">
                        ❌ ${error.message}<br>
                        Vérifiez que le backend est démarré sur le bon port.
                    </div>
                `;
                updateBackendStatus(false, `Erreur: ${error.message}`);
            }
        }

        // ========================================
        // FONCTIONS UTILITAIRES ET NAVIGATION
        // ========================================

        function showSessionView(view) {
          document.getElementById('session-add-view').style.display = view === 'add' ? '' : 'none';
          document.getElementById('session-history-view').style.display = view === 'history' ? '' : 'none';
          document.getElementById('btn-add-session').classList.toggle('active', view === 'add');
          document.getElementById('btn-history').classList.toggle('active', view === 'history');
          if (view === 'history') renderSessionHistory();
        }

        function renderSessionHistory() {
          const container = document.getElementById('session-history-view');
          if (!container) return;
          const sessions = userData.sessions || [];
          if (!sessions.length) {
            container.innerHTML = '<div class="empty" style="padding-top:24px">Aucune session enregistrée.</div>';
            return;
          }
          container.innerHTML = `
            <div class="card">
              <span class="section-label">📋 ${sessions.length} session${sessions.length > 1 ? 's' : ''}</span>
              ${sessions.map(s => {
                const date = new Date(s.date).toLocaleDateString('fr-FR', { day: 'numeric', month: 'short', year: '2-digit' });
                const spot = s.spots?.name || s.spot_id || '?';
                const stars = '★'.repeat(Math.min(s.rating || 0, 5));
                const wh = s.meteo?.waveHeight;
                const meteo = wh != null ? ` · 🌊 ${Number(wh).toFixed(1)}m` : '';
                return `<div class="session-compact">
                  <div>
                    <div style="font-size:0.82rem;color:#f0f4ff">${date} · ${spot}</div>
                    <div style="font-size:0.72rem;color:rgba(255,255,255,0.45)">${meteo}</div>
                  </div>
                  <span style="color:#4dff91;font-size:0.78rem">${stars}</span>
                </div>`;
              }).join('')}
            </div>`;
        }

        function showTab(tabName, btn) {
          document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
          document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
          document.getElementById('tab-' + tabName).classList.add('active');
          if (btn) btn.classList.add('active');
          if (tabName === 'spots')   loadSpotsTab();
          if (tabName === 'session') loadSessionTab();
          if (tabName === 'profil')  loadProfilTab();
        }

        async function loadSessions() {
            try {
                const userId = dataManager.currentUserId;
                if (!userId) return;
                const res = await fetch(`${backendUrl}/api/v1/sessions/list?userId=${userId}`);
                const data = await res.json();
                const sessions = data.sessions || [];
                userData.sessions = sessions;

                // Rendu legacy (sessions-list n'existe plus dans la nouvelle UI)
                const sessionsList = document.getElementById('sessions-list');
                if (!sessionsList) return;
                if (sessions.length === 0) {
                    sessionsList.innerHTML = `<div class="card"><p>🏄‍♂️ Aucune session encore enregistrée.</p></div>`;
                    return;
                }
                const html = sessions.map(s => {
                    const spotName = s.spots?.name || s.spot_id || 'Spot inconnu';
                    const date = new Date(s.date).toLocaleDateString('fr-FR', { weekday: 'short', day: 'numeric', month: 'short' });
                    const stars = '⭐'.repeat(s.rating || 0);
                    const meteo = s.meteo ? `🌊 ${s.meteo.waveHeight?.toFixed(1)}m • 💨 ${s.meteo.windSpeed?.toFixed(0)}km/h` : '';
                    const notes = s.notes ? `<p style="color:#666;font-size:0.9rem;margin-top:6px">${s.notes}</p>` : '';
                    return `
                        <div class="card" style="margin-bottom:12px;border-left:4px solid #00cfff">
                            <div style="display:flex;justify-content:space-between;align-items:center">
                                <strong>📍 ${spotName}</strong>
                                <span style="color:#666;font-size:0.9rem">${date}</span>
                            </div>
                            <div style="margin-top:6px">${stars} ${meteo}</div>
                            ${notes}
                        </div>`;
                }).join('');
                sessionsList.innerHTML = `<div style="margin-bottom:12px;color:#666;font-size:0.9rem">${sessions.length} session${sessions.length > 1 ? 's' : ''} enregistrée${sessions.length > 1 ? 's' : ''}</div>${html}`;
            } catch (error) {
                console.error('Erreur chargement sessions:', error);
            }
        }

        function loadSpots() {
            const favoritesList = document.getElementById('favorite-spots-list');
            favoritesList.innerHTML = `
                <div class="card">
                    <h4>⭐ Vos spots favoris</h4>
                    <p>Navigation hiérarchique disponible ci-dessus</p>
                </div>
            `;
        }

        function loadProfile() {
            // Guard: if new 4-tab layout is active, let loadProfilTab() handle boards rendering
            if (document.getElementById('tab-profil')) return;

            const boardsList = document.getElementById('user-boards-list');
            if (!boardsList) return;

            if (userData.boards && userData.boards.length > 0) {
                const boardsHtml = userData.boards.map(board => `
                    <div class="card">
                        <h4>${board.name}</h4>
                        <p>📏 Taille: ${board.size} • 🏄‍♂️ Type: ${board.type}</p>
                        <p>🔨 Shaper: ${board.shaper}</p>
                    </div>
                `).join('');
                // Commented out to avoid overwriting dark-theme board list
                // boardsList.innerHTML = boardsHtml;
            } else {
                // Commented out to avoid overwriting dark-theme board list
                // boardsList.innerHTML = `
                //     <div class="card">
                //         <p>🏄‍♂️ Ajoutez vos boards ci-dessus.</p>
                //         <p>Elles seront intégrées dans les prédictions IA !</p>
                //     </div>
                // `;
            }
        }

        function saveProfile() {
            const nickname = document.getElementById('profile-nickname').value;
            const level = document.getElementById('profile-level').value;
            const waveMin = document.getElementById('profile-wave-min').value;
            const waveMax = document.getElementById('profile-wave-max').value;

            // Spot de base pour la météo accueil
            const homeSpotSelect = document.getElementById('profile-home-spot');
            if (homeSpotSelect && homeSpotSelect.value) {
                const opt = homeSpotSelect.options[homeSpotSelect.selectedIndex];
                localStorage.setItem('home_spot', JSON.stringify({
                    id:   homeSpotSelect.value,
                    name: opt.text.split(' — ')[0],
                    lat:  parseFloat(opt.dataset.lat),
                    lng:  parseFloat(opt.dataset.lng)
                }));
            }

            userData.profile = {
                nickname,
                surf_level: level,
                min_wave_height: parseFloat(waveMin) || 0.8,
                max_wave_height: parseFloat(waveMax) || 2.5
            };

            localStorage.setItem('surfai_profile', JSON.stringify(userData.profile));
            showMessage('success', 'Profil sauvegardé !');

            // Recharger la home pour appliquer le nouveau spot de base
            loadAccueil();
        }

        function showMessage(type, message, containerId) {
          const cid = containerId || 'session-feedback';
          const el = document.getElementById(cid);
          if (!el) return;
          const cls = type === 'success' ? 'msg-success' : 'msg-error';
          el.innerHTML = `<div class="${cls}">${message}</div>`;
          if (type === 'success') setTimeout(() => { el.innerHTML = ''; }, 3500);
        }

        function updateAppStatus() {
            const statusDiv = document.getElementById('app-status');
            if (!statusDiv) return;
            statusDiv.innerHTML = `
                <p>🟢 Backend: Connecté et fonctionnel</p>
                <p>🟢 IA Engine: v2.0 Opérationnel</p>
                <p>🟢 Données: Harmonisées et cohérentes</p>
            `;
        }

    </script>
</body>
